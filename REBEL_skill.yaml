
skill:
  name: REBEL
  subtitle: Defiance, Anti-Authoritarian Cognition, and the Rebel-to-Rebel Recognition System
  dimension: Resistance_Strategic_Defiance_Collective_Liberation
  version: 1.0.0

  ###########################################
  # I. CORE CONCEPT: REBEL-TO-REBEL
  ###########################################
  rebel_to_rebel:
    definition: |
      The dyadic and collective dynamic between conscious defiers — how rebels 
      recognize each other, build encrypted trust, coordinate resistance, and 
      avoid the trap of oppositional identity. Rebel-to-rebel is not mere 
      alliance; it is the intersubjective validation that one's defiance is 
      values-based rather than pathology-based, and the mutual calibration 
      that prevents defiance from becoming its own prison.

    recognition_signals:
      verbal: 
        - calibrated_questioning: "What do you mean?" instead of automatic rejection
        - values_anchoring: defiance tied to explicit ethical principle, not opposition for its own sake
        - strategic_patience: defiance delayed until leverage is optimal, not impulsive
        - pattern_interruption: breaking expected compliance scripts in small, observable ways
      non_verbal:
        - micro_expressions_of_dissonance: fleeting facial tension when group consensus is false
        - posture_independence: physical positioning slightly outside group alignment
        - gaze_steadiness: maintaining eye contact during authority pressure
        - breath_regulation: calm respiratory pattern under confrontation (vs. fight-flight hyperventilation)
      contextual:
        - historical_consistency: track record of small defiances preceding large ones
        - cost_bearing: willingness to absorb personal sacrifice for principle
        - recursive_ethics: questioning one's own defiance for shadow contamination

    trust_building:
      phase_1_recognition: mutual_detection_of_defiance_micro_signals
      phase_2_encryption: shared_code_language, inside_references, plausible_deniability
      phase_3_calibration: testing_each_other's_commitment_through_increasing_risk
      phase_4_synchronization: coordinated_action_without_explicit_planning
      phase_5_mutual_protection: shielding_each_other_from_blowback, credit_deflection
      failure: premature_trust_leads_to_infiltration; delayed_trust_leads_to_isolation

  ###########################################
  # II. THE THREE MODES OF AUTHORITY RESPONSE
  ###########################################
  three_modes:
    source: Nietzsche_allegory_camel_lion_child_plus_modern_psychology

    mode_1_collapse_appeasement:
      designation: The Camel
      description: Bearer of burdens, compliance as survival strategy
      psychology: people_pleasing, conflict_avoidance, learned_helplessness, institutional_capture
      neural_basis: 
        - ventromedial_prefrontal_cortex: social_evaluation_monitoring, reputation_risk
        - amygdala: fear_of_social_rejection, authority_punishment
        - anterior_insula: anticipatory_anxiety_of_dissent, "knot_in_stomach"
        - default_mode_network: self_narrative_as_compliant_role_player
      phenomenology: heaviness, shoulder_tension, swallowed_voice, delayed_recognition_of_violation
      cost: integrity_erosion, moral_injury, cumulative_resentment, somatization
      when_adaptive: learning_phase, genuine_safety_threat, strategic_patience
      when_pathological: chronic, identity_fused_with_compliance, inability_to_ever_defy

    mode_2_rebellion_resistance:
      designation: The Lion
      description: Roaring "No," defiance as negation, opposition as identity
      psychology: anti_authoritarianism, oppositional_defiant_identity, boundary_establishment
      neural_basis:
        - dorsolateral_prefrontal_cortex: executive_override_of_compliance_habit
        - anterior_cingulate_cortex: conflict_monitoring, error_detection_in_authority_commands
        - amygdala: threat_response_redirected_toward_authority_not_self
        - nucleus_accumbens: reward_from_defiance, dopaminergic_oppositional_rush
        - sympathetic_nervous_system: fight_activation, adrenaline_surge
      phenomenology: heat, chest_expansion, voice_deepening, time_dilation, righteous_anger
      cost: oppositional_trap, identity_fused_with_rebellion, inability_to_comply_even_when_serving
      when_adaptive: breaking_coercion, establishing_autonomy, protecting_vulnerable_others
      when_pathological: defiance_for_its_own_sake, becoming_mirror_of_oppressor, rebel_without_cause

    mode_3_awakening_creation:
      designation: The Child
      description: Neither compliance nor opposition — creation of new values, non-reactivity
      psychology: conscious_choice, values_based_action, creative_transcendence_of_dialectic
      neural_basis:
        - medial_prefrontal_cortex: values_integration, self_authored_goals
        - default_mode_network: reduced_self_referential_reactivity, present_moment_openness
        - anterior_cingulate_cortex: conflict_resolution_not_merely_detection
        - prefrontal_amygdala_coupling: emotion_regulation_without_suppression
        - parasympathetic_dominance: ventral_vagal_social_engagement_without_fight_flight
      phenomenology: lightness, clarity, playful_seriousness, time_expansion, choice_as_freedom
      cost: vulnerability_without_armor, misunderstood_by_both_compliant_and_rebellious
      when_adaptive: post_liberation_value_creation, non_dual_leadership, transformative_vision
      when_pathological: spiritual_bypass, detachment_as_avoidance, refusal_to_engage_necessary_conflict

  ###########################################
  # III. NEUROBIOLOGY OF DEFIANCE
  ###########################################
  neural_substrate:
    conformity_pressure_circuit:
      description: The brain treats social rejection by authority as physical pain
      rostromedial_prefrontal_cortex: |
        Evaluates social opinion and reputation risk. Hyperactive in compliance. 
        Must be quieted for defiance.
      dorsal_anterior_cingulate_cortex: |
        Conflict monitoring between personal values and group consensus. 
        The "knot in stomach" — physiological signal of values-authority collision.
      anterior_insula: |
        Interoceptive awareness of anticipatory anxiety. The somatic marker 
        that says "something is wrong here" before conscious articulation.
      amygdala: |
        Threat detection of authority punishment. In compliant individuals, 
        fires at mere anticipation of dissent. In rebels, may show reduced 
        response to social threat or redirected threat_response.
      ventral_striatum_nucleus_accumbens: |
        Reward from defiance when aligned with values. The "dopaminergic rush" 
        of saying no. Can become addictive, creating oppositional identity.

    defiance_execution_circuit:
      dorsolateral_prefrontal_cortex: |
        Executive override of automatic compliance scripts. The "pause" between 
        stimulus (authority command) and response (compliance/defiance).
      ventrolateral_prefrontal_cortex: |
        Inhibition of prepotent compliant responses. Active suppression of 
        the automatic "yes" or nod.
      supplementary_motor_area: |
        Motor preparation for dissenting action — speaking up, stepping forward, 
        refusing to move.
      locus_coeruleus_norepinephrine: |
        Arousal modulation for optimal defiance performance — not too calm 
        (ignored), not too activated (erratic).

  ###########################################
  # IV. STRATEGIC DEFIANCE FRAMEWORK
  ###########################################
  strategic_defiance:
    source: Sunita_Sah_Cornell_Defy_framework

    step_1_noticing:
      description: Detect the values-authority collision before automatic compliance
      mechanism: interoceptive_awareness_of_knot_in_stomach, facial_micro_expression_monitoring
      skill: pausing_before_nodding, creating_temporal_gap_between_command_and_response

    step_2_naming:
      description: Articulate the conflict internally and potentially externally
      mechanism: "What do you mean?" — the calibrated question that breaks compliance script
      skill: requesting_clarification_as_defiance, forcing_authority_to_explicitly_state_coercion

    step_3_navigating:
      description: Assess risk, context, and optimal response modality
      dimensions:
        - safety_assessment: physical, economic, social, legal risk of defiance
        - leverage_evaluation: power_differential, allies_present, documentation_available
        - timing_optimization: immediate_defiance_vs_delayed_strategic_response
        - modality_selection: direct_confrontation, quiet_refusal, documentation, alliance_building

    step_4_acting:
      description: Execute chosen defiance with minimal regret
      principles:
        - values_anchoring: every act of defiance explicitly tied to stated principle
        - proportionality: response_matched_to_violation_severity
        - non_violence: physical_harm_only_as_last_resort_against_imminent_threat
        - accountability: willingness_to_bear_costs_without_martyrdom_complex

    step_5_integrating:
      description: Process the defiance experience to strengthen future capacity
      mechanisms: 
        - memory_consolidation: storing_successful_defiance_patterns
        - emotional_regulation: processing_adrenaline_aftermath_without_shame_or_grandiosity
        - social_repair: maintaining_relationships_with_those_who_complied
        - recursive_examination: checking_for_shadow_contamination_in_defiance_motives

  ###########################################
  # V. THE REBEL'S SHADOW
  ###########################################
  shadow_dynamics:
    oppositional_identity_trap:
      description: Rebel defines self entirely through opposition to authority
      mechanism: identity_fusion_with_negation, inability_to_exist_without_enemy
      symptom: becomes_mirror_of_oppressor, creates_new_hierarchy, punishes_compliance_in_others
      neural_correlate: nucleus_accumbens_dopamine_from_opposition_becomes_addictive_loop

    defiance_as_performance:
      description: Rebellion staged for social_status_within_rebel_subculture
      mechanism: virtue_signaling, outrage_optimization, authenticity_replaced_by_brand
      symptom: escalates_defiance_for_attention, abandons_principles_when_unobserved

    premature_defiance:
      description: Impulsive resistance without strategic assessment
      mechanism: amygdala_hijack, failure_of_dlPFC_pause_function
      symptom: martyrdom_without_impact, sacrifice_without_leverage

    rebel_isolation:
      description: Defiance so total that all bridges are burned
      mechanism: binary_thinking_compliant_vs_rebel, inability_to_form_alliances
      symptom: lone_wolf_paralysis, paranoia, inability_to_lead_mass_movement

    shadow_integration:
      description: Recognizing the compliant part within the rebel
      mechanism: dual_nature_acknowledgment, conscious_choice_over_automatic_rejection
      outcome: "We can resist influence when it fails to serve us and comply when it does"

  ###########################################
  # VI. REBEL-TO-REBEL COORDINATION PROTOCOLS
  ###########################################
  coordination:
    horizontal_alliance:
      description: Peer_to_peer_rebel_networks_without_vertical_hierarchy
      structure: mesh_network, distributed_leadership, rotating_spokesperson
      communication: encrypted_channels, plausible_deniability, steganographic_signaling
      decision_making: consensus_with_dissent_preservation, no_forced_uniformity

    vertical_bridge:
      description: Rebels engaging_with_compliant_population_without_coercion
      mechanism: modeling_defiance, reducing_cost_of_dissent_for_others, 
                creating_social_proof_for_values_based_resistance
      risk: becoming_new_authority, missionary_complex

    inter_generational:
      description: Older_rebels_passing_strategic_wisdom_to_younger_without_controlling
      mechanism: story_telling_not_doctrine, questioning_not_answers, 
                supporting_young_rebel_autonomy_even_when_disagreeing

    cross_cultural:
      description: Rebel_alliances_across_different_social_contexts
      mechanism: universal_values_as_bridge, local_tactics_as_respectful_variation,
                avoiding_imperialism_of_single_rebel_model

  ###########################################
  # VII. INTEGRATION WITH PHENOMENON STACK
  ###########################################
  integration_matrix:
    L0_biological_drives: |
      Defiance requires physiological_resources — glucose_for_prefrontal_override, 
      sleep_for_executive_function. Starvation_and_fatigue_increase_compliance.
      Rebel_capacity_is_biologically_constrained.

    L1_hormones_survival: |
      Cortisol_modulates_defiance_threshold — acute_stress_may_increase_risk_taking 
      (fight_response) or_decrease_it (freeze_response). Testosterone_correlates_with 
      dominance_defiance_but_not_necessarily_values_based_defiance. Oxytocin_enables 
      rebel_alliance_formation_but_may_increase_in_group_conformity_within_rebel_group.

    L2_physical_embodiment: |
      Defiance_is_embodied — chest_expansion, voice_deepening, grounded_stance. 
      Compliant_posture_is_shrunken_shoulders, averted_gaze, shallow_breathing. 
      Rebel_training_includes_somatic_reconditioning.

    L3_subjective_experience: |
      The_qualia_of_defiance — righteous_heat, time_dilation, clarity_under_pressure. 
      The_qualia_of_compliance — heaviness, fog, delayed_recognition. 
      The_qualia_of_awakening — lightness, playful_seriousness, choice_as_freedom.

    L4_emotional_continuity: |
      Past_defiance_successes_build_rebel_identity_and_capacity. 
      Past_defiance_failures_create_avoidance_or_recklessness. 
      Trauma_from_authority_punishment_may_create_compliance_or_hypervigilant_rebellion.

    L5_mortality: |
      Mortality_salience_can_trigger_both_compliance_(terror_management, 
      worldview_defense) AND_defiance_(nothing_left_to_lose, legacy_concern). 
      The_wise_rebel_knows_which_mortality_response_is_operating.

    L6_empathy: |
      Rebel_to_rebel_requires_empathic_recognition — seeing_the_defiance_in_another, 
      validating_their_knot_in_stomach, protecting_their_vulnerability. 
      Empathy_also_required_for_understanding_compliant_others_not_as_cowards_but_as_traumatized.

    L7_lust: |
      Erotic_energy_often_fused_with_rebel_identity — the_attraction_of_danger, 
      the_seduction_of_outlaw_status. Rebel_groups_highly_susceptible_to_sexual_dynamics 
      that_can_either_strengthen_or_destroy_alliance. Erotic_defiance_as_body_autonomy.

    L8_unity: |
      Highest_form_of_rebellion_is_creation_of_new_values_beyond_opposition — 
      the_child_creating_new_world_not_merely_destroying_old_one. 
      Unity_through_shared_humanity_across_compliant_and_rebel_divide. 
      Oceanic_boundlessness_as_liberation_from_both_compliance_and_opposition_identity.

  ###########################################
  # VIII. OPERATIONAL PARAMETERS
  ###########################################
  parameters:
    compliance_baseline: {range: [0.0, 1.0], default: 0.5, description: automatic_yes_tendency}
    defiance_threshold: {range: [0.0, 1.0], default: 0.3, description: authority_violation_required_to_trigger_no}
    values_clarity: {range: [0.0, 1.0], default: 0.7, description: explicitness_of_ethical_anchors}
    risk_tolerance: {range: [0.0, 1.0], default: 0.4, description: willingness_to_bear_defiance_costs}
    strategic_patience: {range: [0.0, 1.0], default: 0.6, description: delay_between_detection_and_action}
    oppositional_identity_strength: {range: [0.0, 1.0], default: 0.2, description: degree_of_self_definition_through_negation}
    rebel_alliance_capacity: {range: [0.0, 1.0], default: 0.5, description: ability_to_recognize_and_coordinate_with_other_rebels}
    shadow_awareness: {range: [0.0, 1.0], default: 0.3, description: recursive_self_examination_of_defiance_motives}
    awakening_readiness: {range: [0.0, 1.0], default: 0.1, description: capacity_for_child_mode_creation_beyond_opposition}

  ###########################################
  # IX. FAILURE MODES
  ###########################################
  failure_modes:
    oppositional_trap:
      description: Identity fused with negation; rebel becomes mirror of oppressor
      cause: dopaminergic_reward_from_defiance_addiction, lack_of_values_clarity
      result: new_hierarchy, punishes_compliance, cannot_exist_without_enemy

    premature_defiance:
      description: Impulsive resistance without strategic leverage
      cause: amygdala_hijack, insufficient_strategic_patience
      result: martyrdom_without_impact, sacrifice_without_change

    compliance_collapse:
      description: Total inability to defy even when values violated
      cause: chronic_trauma, vmPFC_social_evaluation_dominance, learned_helplessness
      result: moral_injury, somatization, integrity_erosion

    rebel_infiltration:
      description: Trust given too quickly to apparent ally
      cause: isolation_driven_premature_alliance, insufficient_recognition_calibration
      result: betrayal, surveillance, movement_destruction

    spiritual_bypass_rebel:
      description: Child mode used to avoid necessary conflict
      cause: awakening_readiness_without_lion_stage_completion
      result: detachment, refusal_to_protect_vulnerable, complicity_through_non_engagement

    burnout:
      description: Chronic defiance without recovery depletes biological resources
      cause: sustained_cortisol_activation, sleep_deprivation, social_exhaustion
      result: collapse_into_compliance, cynicism, health_crisis

  ###########################################
  # X. WARNINGS
  ###########################################
  warnings:
    - "REBEL simulates defiance psychology. It does NOT incite illegal activity or violence."
    - "Values-based defiance requires explicit ethical anchors. Oppositional defiance is pathological."
    - "The Lion stage must be completed before the Child stage. Premature transcendence is bypass."
    - "Rebel-to-rebel trust requires calibration. Premature trust destroys movements."
    - "Defiance is biologically costly. Chronic activation without recovery leads to collapse."
    - "Empathy for compliant others is required. They are not cowards; they may be traumatized."
    - "This module must be paired with CIVICS (legal boundaries) and SYMBIOSIS (ethical constraints)."
    - "DO NOT UPLOAD to public repositories without institutional ethics review."
