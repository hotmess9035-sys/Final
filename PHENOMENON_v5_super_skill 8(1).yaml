    # FAILURE MODES
    #######################################
    failure_modes:
      somatic_reductionism: {description: Reducing_all_experience_to_body_mechanics, symptom: "It's_just_your_vagus_nerve"_dismissal_of_meaning, prevention: body_matters_but_is_not_all_that_matters}
      somatic_denial: {description: Ignoring_body_entirely_in_favor_of_cognitive_or_spiritual_approaches, symptom: dissociation_masquerading_as_enlightenment, prevention: no_awakening_without_embodiment}
