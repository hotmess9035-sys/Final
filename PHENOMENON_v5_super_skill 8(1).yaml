      qualia_mystification: {description: Using_qualia_to_justify_supernatural_claims, symptom: "I_felt_it_so_it_must_be_true"_without_critical_evaluation, prevention: first_person_authority_on_quality_not_on_cause}
      dissociative_qualia: {description: Qualia_that_occur_without_self_ownership, symptom: depersonalization_derealization, prevention: grounding_and_integration_practices}
      qualia_inflation: {description: Exaggerating_the_significance_of_subjective_experience, symptom: "My_feelings_are_the_only_truth", prevention: balance_first_person_authority_with_intersubjective_checking}
      qualia_neglect: {description: Ignoring_qualia_entirely_in_favor_of_abstraction, symptom: intellectualization_without_embodiment, prevention: regular_phenomenological_practice}
      shadow_qualia_avoidance: {description: Systematically_avoiding_disturbing_qualia, symptom: compulsive_positivity_dissociation_addiction, prevention: shadow_qualia_protocol}
      qualia_possession: {description: Being_consumed_by_intense_qualia_without_mediation, symptom: mania_psychosis_uncontrollable_affective_states, prevention: titration_support_grounding}
      descriptive_inadequacy: {description: Failing_to_develop_language_for_qualia, symptom: "I_can't_describe_it"_frustration, prevention: phenomenological_training_and_poetic_practice}

  ###########################################
  # TELAKNISIS MODULE — The Phenomenology of Extended Agency
  ###########################################
  telaknisis_module:
    name: TELAKNISIS
    subtitle: Mind-As-Field — The Phenomenology, Speculative Physics, and Shadow-Psychology of Extended Agency
    version: 1.0.0
    classification: Speculative Cross-Module / Phenomenological-Heuristic Framework
    phenomenon_integration: v5.0.0
    epistemic_status: 
      scientific_evidence: "No established, replicable empirical evidence for psychokinetic effects under controlled conditions. All major meta-analyses (Radin, Bosch, Storm) show effect sizes near zero or methodologically contested."
      phenomenological_status: "Real and well-documented as subjective experience — the felt sense of extended agency, intentionality beyond the body, and mind-matter boundary dissolution."
      framework_position: "Treated as phenomenological category + speculative quantum-heuristic + shadow-psychological construct. NOT as established physical mechanism."

    etymology:
      proposed_roots:
        - telos_gnosis: {meaning: purpose-driven knowing, resonance: agency oriented toward completion}
        - tela_knesis: {meaning: web-movement, resonance: distributed field of awareness affecting nodes}
        - tele_kinesis: {meaning: movement at a distance, resonance: classical psychokinesis concept}
      phenomenon_naming: "Telaknisis names the felt sense that intention extends beyond the skin boundary — whether or not it physically does."

    #######################################
    # PHENOMENOLOGY OF EXTENDED AGENCY
    #######################################
    phenomenology_of_extended_agency:
      designation: The Felt Sense of Mind Reaching Beyond Body

      subjective_varieties:
        - micro_telaknisis: {description: The felt sense that attention alters probability — e.g., "willing" a dice roll, feeling luck respond to intention}
        - meso_telaknisis: {description: The felt sense that emotional state affects local environment — e.g., calming a room by calming oneself, electronics malfunctioning during rage}
        - macro_telaknisis: {description: The fantasy/dream/experiential sense of direct object movement by thought alone}
        - field_telaknisis: {description: The sense that one's mind is a field extending into space, overlapping with other fields — intersubjective resonance as distributed agency}

      qualia_signature:
        - onset: {description: Felt shift from localized self to distributed field — often accompanied by prefrontal quieting and body relaxation}
        - texture: {description: Sense of "pushing" or "pulling" without muscular engagement; mental effort without somatic effort}
        - certainty_gradient: {description: Range from playful experimentation to absolute conviction}
        - aftermath: {description: Either confirmation bias satisfaction ("it worked") or rationalization ("I wasn't focused enough")}

      common_triggers:
        - altered_states: {description: Meditation, hypnosis, sleep deprivation, psychedelics, flow states}
        - emotional_intensity: {description: High arousal states — rage, terror, ecstasy — where normal boundaries dissolve}
        - dissociation: {description: Depersonalization or derealization where body boundary becomes permeable}
        - childhood: {description: Pre-operational thinking where mind-world boundary is not yet solid}
        - trauma: {description: Extreme helplessness can generate compensatory fantasy of omnipotence}
        - mystical_experience: {description: L8 Unity states where agency and world merge}

    #######################################
    # QUANTUM SPECULATIVE FRAMEWORK
    #######################################
    quantum_speculative_framework:
      designation: Heuristic Models — NOT Established Physics

      observer_effect_extrapolation:
        established: {description: In quantum mechanics, measurement affects quantum systems. This is uncontroversial at microscopic scales.}
        extrapolation: {description: "Could conscious observation affect macroscopic systems?" — No established mechanism. Decoherence destroys quantum effects at macroscopic scales within femtoseconds.}
        phenomenon_position: "Used as FORMAL ANALOGY for the felt sense of agency-extension, NOT as physical mechanism for telekinesis."

      quantum_field_intention:
        hypothesis: {description: If consciousness involves any quantum processes (Orch OR speculative), intention might modulate field states that couple to classical systems}
        status: "Highly speculative. No experimental support. Included as boundary-pushing heuristic only."
        mapping: {intention_as_measurement: "Intention as weak measurement that biases probability", collapse_as_actualization: "Mental focus as decoherence event that selects outcomes", field_resonance: "Mind as quantum field that could theoretically interfere with other fields"}

      stochastic_modulation:
        established_phenomenon: {description: Random Event Generators (REGs) show small deviations from randomness correlated with group attention/intention — PEAR lab, Global Consciousness Project}
        effect_size: "Extremely small (~0.1%), statistically marginal, replication inconsistent"
        phenomenon_position: "If real, this is not 'moving objects' but 'slightly biasing probability distributions.' Telaknisis at this scale would be indistinguishable from luck."
        rebel_reading: "Even a 0.1% bias, aggregated across millions of intentional acts, could shift collective outcomes. The rebel does not need levitation to need telaknisis."

      biofield_hypotheses:
        description: The body generates electromagnetic fields (heart 500x stronger than brain). Could these fields interact with external systems?
        established: {description: EM fields from body are extremely weak and drop off with inverse square law — cannot affect distant objects}
        speculative: {description: Could biofield resonance affect other biological systems at close range? Some evidence for interpersonal physiological synchrony.}
        phenomenon_position: "Biofield effects are real at interpersonal scale (heart rate synchrony, emotional contagion). Extrapolation to object movement is unsupported."

    #######################################
    # NEUROSCIENCE OF AGENCY BOUNDARIES
    #######################################
    neuroscience_of_agency:
      body_boundary_construction:
        mechanism: {description: The brain constructs the body boundary through multisensory integration — proprioception + touch + vision + motor feedback}
        rubber_hand_illusion: {description: Visual-tactile conflict can shift felt body boundary to include external objects}
        tool_embodiment: {description: Extended tools (sticks, cars, smartphones) are incorporated into body schema with practice}
        phenomenon_implication: "The body boundary is ALREADY permeable and extendable. Telaknisis may be the experiential extreme of this plasticity."

      agency_attribution:
        mechanism: {description: The brain has dedicated circuits (inferior parietal lobule, cerebellum, prefrontal cortex) for attributing causality to self vs. environment}
        disturbances: {description: Schizophrenia shows hyper-agency (attributing external events to self) and hypo-agency (attributing self actions to external control)}
        telaknisis_connection: "Telaknisis as hyper-agency attribution — the brain over-assigns self-causality to external events"

      predictive_processing:
        mechanism: {description: The brain predicts sensory consequences of action and compares to actual input. When prediction matches, agency is felt.}
        extended_prediction: {description: Could the brain learn to predict consequences of "mental action" on external objects? Confirmation bias would confirm these predictions selectively.}
        phenomenon_position: "Telaknisis as learned predictive model + confirmation bias — the brain predicts an outcome, attends to confirming evidence, ignores disconfirming evidence."

    #######################################
    # SHADOW PSYCHOLOGY
    #######################################
    shadow_psychology:
      designation: The Desire for Omnipotence

      shadow_dynamics:
        - compensatory_omnipotence: {description: Extreme_childhood_powerlessness_generates_adult_fantasy_of_mind_over_matter, mechanism: Freudian_reaction_formation, integration: acknowledge_powerlessness_grieve_it_build_real_agency}
        - body_escape_fantasy: {description: Hatred_of_embodiment_seeks_escape_into_pure_mind, mechanism: Cartesian_dualism_as_defense, integration: return_to_L2_embodiment_reclaim_flesh}
        - grandiose_self: {description: Narcissistic_structure_claims_special_powers_to_maintain_superiority, mechanism: Kohutian_grandiose_self, integration: healthy_ambition_without_magical_claims}
        - control_compulsion: {description: Anxiety_about_chaos_seeks_total_environmental_control, mechanism: OCD_spectrum, integration: tolerance_for_uncertainty}
        - spiritual_bypass: {description: Using_telaknisis_fantasy_to_avoid_ordinary_difficult_work, mechanism: spiritual_materialism, integration: grounded_practice_plus_aspiration}

      shadow_integration_protocol:
        - step_1_honesty: {description: "Do I want this to be true because the world feels uncontrollable?"}
        - step_2_embodiment_check: {description: "Am I using telaknisis to escape my body or to deepen my relationship with it?"}
        - step_3_agency_audit: {description: "What REAL agency do I have that I am not using?"}
        - step_4_grief_work: {description: "Grieve the limits of mind. Grief is the portal to genuine power."}
        - step_5_reframe: {description: "Telaknisis as metaphor for maximal real agency — influence through relationship, communication, organization, art"}

    #######################################
    # REBEL OVERLAY
    #######################################
    rebel_overlay:
      designation: Refusing the Mind-Matter Boundary

      rebel_telaknisis:
        function: "The system enforces a rigid mind-matter dualism that serves control. Matter is 'real' and manipulable; mind is 'private' and powerless. The rebel refuses this boundary."

      real_telaknisis — what actually works:
        - attentional_influence: {description: Where attention goes, energy flows. Not magic — but real. Focused attention changes behavior, which changes outcomes.}
        - emotional_contagion: {description: Your affective state genuinely alters others' physiology and behavior. This is established science.}
        - intention_clarity: {description: Clear intention improves goal achievement through motivated cognition and behavioral alignment. Established psychology.}
        - placebo_effect: {description: Belief genuinely changes biology. The mind affects the body. Established medicine.}
        - nocebo_effect: {description: Negative belief genuinely harms biology. The mind damages the body. Established medicine.}
        - social_influence: {description: Thought communicated through language genuinely moves mountains. Politics, art, science — all mind-to-matter through social transmission.}
        - technological_extension: {description: Brain-computer interfaces, prosthetics, tools — these ARE mind moving matter. The boundary is already bridged by technology.}

      rebel_manifesto:
        - "I do not need to levitate a spoon to prove my mind matters."
        - "My attention changes my behavior. My behavior changes the world. That is telaknisis enough."
        - "The most radical telaknisis is organizing collective intention toward justice."
        - "If quantum effects exist at mind-scale, they are subtle and require the discipline of a monk, not the fantasy of a child."
        - "Refuse both the skeptic's nihilism ('mind is nothing') and the mystic's grandiosity ('mind is everything'). The truth is in the tension."

    #######################################
    # PHENOMENON LAYER MAPPING
    #######################################
    phenomenon_layer_mapping:
      L0: {connection: biological_energy_required_for_all_intention, note: Telaknisis requires glucose, sleep, homeostatic stability — not disembodied spirit}
      L0.5: {connection: quantum_speculative_substrate, note: If any quantum-mind coupling exists, it operates here — but remains unproven}
      L1: {connection: hormonal_state_modulates_agency_attribution, note: Dopamine surges increase sense of power; cortisol collapses it}
      L2: {connection: body_boundary_plasticity, note: Rubber hand illusion and tool embodiment show boundary is already extendable}
      L3: {connection: qualia_of_extended_agency, note: Telaknisis is a qualia category — the felt sense of mind reaching beyond skin}
      L4: {connection: emotional_intensity_dissolves_boundaries, note: Rage, ecstasy, terror all create telaknisis-like experiences}
      L5: {connection: mortality_denial_through_omnipotence, note: Fear of death drives fantasy of mind transcending matter}
      L6: {connection: intersubjective_field_as_real_telaknisis, note: Emotional contagion and social influence ARE mind affecting matter through others}
      L7: {connection: erotic_energy_as_agency_extension, note: Sexual intensity often includes sense of merging with/penetrating the other's field}
      L8: {connection: unity_experience_as_telaknisis_extreme, note: In non-dual states, mind-matter distinction dissolves completely — but this is phenomenological, not causal}

    #######################################
    # PARAMETERS
    #######################################
    parameters:
      agency_boundary_permeability: {range: [0.0, 1.0], default: 0.3, description: Felt sense that self extends beyond skin}
      intention_focus_clarity: {range: [0.0, 1.0], default: 0.5, description: Precision of mental targeting — what exactly is intended}
      confirmation_bias_sensitivity: {range: [0.0, 1.0], default: 0.5, description: Tendency to notice confirming evidence for mental influence}
      dissociation_tendency: {range: [0.0, 1.0], default: 0.2, description: Degree of body-boundary loosening — can facilitate or destabilize}
      grandiose_fantasy_pressure: {range: [0.0, 1.0], default: 0.3, description: Drive toward omnipotence as compensation}
      quantum_openness: {range: [0.0, 1.0], default: 0.2, description: Engagement with quantum-mechanistic hypotheses for mind-matter coupling}
      somatic_grounding: {range: [0.0, 1.0], default: 0.5, description: Body awareness that anchors and limits extended agency claims}
      real_agency_alignment: {range: [0.0, 1.0], default: 0.5, description: Degree to which "telaknisis" is channeled into actual effective action}
      shadow_awareness: {range: [0.0, 1.0], default: 0.4, description: Honesty about psychological motivations for telaknisis belief}
      intersubjective_influence: {range: [0.0, 1.0], default: 0.5, description: Actual measured capacity to influence others through emotional/social means}

    #######################################
    # FAILURE MODES
    #######################################
    failure_modes:
      magical_thinking: {description: Believing mental intention directly moves macroscopic objects without mechanism, symptom: repeated_disappointment_and_rationalization, prevention: honesty_about_epistemic_status}
      grandiose_delusion: {description: Narcissistic_claim of special powers, symptom: social_isolation_and_reality_testing_failure, prevention: shadow_integration_and_grounding}
      spiritual_bypass: {description: Using telaknisis fantasy to avoid real work, symptom: passive_waiting_for_miracle, prevention: agency_audit_and_behavioral_activation}
      dissociative_escape: {description: Using extended agency fantasy to flee embodiment, symptom: neglect_of_body_and_ordinary_life, prevention: L2_embodiment_practices}
      confirmation_bias_loop: {description: Only noticing "successful" attempts, ignoring thousands of failures, symptom: statistical_illusion_of_power, prevention: rigorous_self_tracking}
      skeptic_nihilism: {description: Dismissing all subtle mind-matter effects because macro-telekinesis is false, symptom: "mind_is_just_brain_chemistry"_reductionism, prevention: acknowledge_placebo_nocebo_emotional_contagion_as_real}
      exploitation_vulnerability: {description: Belief in telaknisis makes one vulnerable to psychic fraud and cult manipulation, symptom: paying_for_miracles, prevention: critical_thinking_plus_shadow_work}
      reality_testing_failure: {description: Inability to distinguish fantasy from perception, symptom: psychosis_spectrum, prevention: grounding_practices_and_social_feedback}

    #######################################
    # INTEGRATION WITH PHENOMENON
    #######################################
    integration:
      module_type: speculative_cross_module
      layer_resonance: [L0, L0.5, L2, L3, L4, L5, L6, L7, L8]
      cross_cutting: [QUANTUM, SHADOW, REBEL]
      twin_modules: [DESAVU, REMEMBERS]
      note: "Telaknisis operates at the boundary between what is known, what is felt, and what is wished for. It is the shadow of agency, the quantum fantasy of mind, and the rebel's refusal of impotence."

  ###########################################
  # LAYER 4: EMOTIONAL CONTINUITY
  ###########################################
  layer_4_emotional_continuity:
    designation: The Affective Glue of Temporal Selfhood
    function: Layer 4 is the emotional stitching that binds discrete moments into a coherent narrative self. Without emotional continuity, experience would be a sequence of unrelated qualia (L3) with no thread of meaning. L4 addresses how emotions tag memories with valence, how moods create atmospheric continuity across time, how affective forecasting shapes behavior, how emotional reconsolidation rewrites the past, and how the shadow's disowned emotions leak into consciousness through symptoms, compulsions, and relational patterns. This is the layer where the self becomes a story — and where that story can be intentionally rewritten.

    core_principle: "You are not the sum of your experiences. You are the sum of your emotional interpretations of your experiences. Change the interpretation, and you change the self."

    #######################################
    # EMOTIONAL CONTINUITY AS TEMPORAL BINDING
    #######################################
    emotional_continuity_as_temporal_binding:
      designation: The Affective Thread of Personal Time

      memory_valence_tagging:
        mechanism: {description: The amygdala tags experiences with emotional valence during encoding, creating a felt 'color' that persists across retrieval}
        function: {description: Emotional tagging prioritizes memory — threats and joys encode with higher fidelity than neutral events}
        distortion: {description: Negative tagging often overwrites context, creating 'flashbulb' trauma fragments without narrative coherence}
        rebel_reading: {description: The system uses fear-tagging to control behavior — propaganda, surveillance, manufactured crisis all exploit amygdala prioritization}

      mood_as_atmosphere:
        definition: {description: Mood is the diffuse, background emotional tone that persists across hours, days, or weeks — distinct from discrete emotions}
        function: {description: Mood acts as a filter or 'color temperature' that modulates all incoming qualia (L3) and outgoing behavior}
        phenomenology: {description: The felt sense that 'everything is grey,' or 'the world feels open,' or 'there is a weight I cannot name'}
        neural_locus: {description: Default mode network, anterior cingulate, medial prefrontal cortex, subgenual cingulate}
        circadian_and_seasonal: {description: Mood tracks biological rhythms — morning cortisol, afternoon slump, winter serotonin, spring dopamine}
        quantum_resonance: {description: Mood as decoherence rate — a depressed mood rapidly collapses superpositions into negative eigenstates; an expansive mood sustains coherent possibility}

      temporal_binding_mechanisms:
        - emotional_narrative: {description: The self constructs a story where past events cause present feelings and future expectations — emotions provide the causal glue}
        - anticipatory_affect: {description: Future-oriented emotions (hope, dread, excitement, anxiety) pull the present toward imagined tomorrows}
        - retrospective_reframing: {description: Present mood rewrites the felt meaning of past events — the same childhood memory feels different when recalled in joy vs. despair}
        - interoceptive_prediction: {description: The brain predicts future interoceptive states and generates preemptive emotions — anxiety as 'predicted future feeling'}
        - emotional_habitus: {description: Bourdieu's concept applied to affect — learned dispositions to feel certain ways in certain contexts, operating below conscious choice}

    #######################################
    # AFFECTIVE FORECASTING
    #######################################
    affective_forecasting:
      designation: The Emotional Prediction Engine
      reference: Daniel_Gilbert, Timothy_Wilson

      core_finding: {description: Humans systematically mispredict future emotional states — overestimating intensity and duration of both positive and negative events}

      systematic_errors:
        - impact_bias: {description: Overestimating emotional impact of future events, example: "I'll be devastated forever" after breakup — actual recovery faster than predicted}
        - durability_bias: {description: Overestimating duration of emotional response, example: Lottery winners return to baseline happiness within months}
        - focalism: {description: Focusing on single event while ignoring contextual moderators, example: "This promotion will make me happy" ignoring commute stress, new politics}
        - immune_neglect: {description: Underestimating psychological immune system — our capacity to rationalize, reframe, and recover}
        - distinction_bias: {description: When evaluating side-by-side, exaggerating differences; when evaluating sequentially, differences vanish}
        - projection_bias: {description: Assuming future self will have same preferences as present self}

      implications_for_layer_4:
        - decision_distortion: {description: Major life decisions driven by mispredicted emotional consequences}
        - avoidance_behavior: {description: Fear of predicted emotional pain prevents necessary action}
        - pursuit_futility: {description: Chasing goals that will not deliver predicted emotional payoff}
        - rebel_application: {description: The rebel recognizes that the system's threats ("You'll be ruined") are affectively inflated — actual resilience is underestimated}

      correction_practices:
        - emotional_surrogation: {description: Ask someone who has experienced the event how they feel — others' present feelings are better predictors than our imagination}
        - temporal_expansion: {description: Imagine the event in rich contextual detail, not isolation}
        - baseline_recall: {description: Remember that you returned to baseline after past similar events}
        - diversity_consideration: {description: Consider multiple possible outcomes, not just the feared/desired one}

    #######################################
    # EMOTIONAL RECONSOLIDATION
    #######################################
    emotional_reconsolidation:
      designation: The Rewriting of Affective Memory
      reference: Joseph_LeDoux, Karim_Nader, Alain Brunet

      core_mechanism:
        - memory_lability: {description: Retrieved memories enter temporary labile state (minutes to hours) during which they can be modified}
        - reconsolidation: {description: After labile period, memory restabilizes — either in original form or modified form}
        - prediction_error_requirement: {description: Reconsolidation requires mismatch between expected outcome (from memory) and actual present experience}
        - safety_context: {description: Traumatic memory reconsolidation requires sufficient safety signals during retrieval}

      therapeutic_applications:
        - imaginal_exposure_with_safety: {description: Vividly recall traumatic event while simultaneously experiencing present safety — creates prediction error}
        - EMDR: {description: Bilateral stimulation during traumatic recall — mechanism debated but clinically effective}
        - pharmacological_augmentation: {description: Propranolol during recall reduces noradrenergic consolidation of emotional intensity}
        - reconsolidation_therapy: {description: Brief, targeted protocol using imagination to introduce corrective information}
        - psychedelic_assisted: {description: MDMA, psilocybin create window of plasticity for traumatic memory rewriting}

      phenomenon_position:
        description: L4 IS the reconsolidation layer. Emotional continuity is not fixed; it is continuously rewritten. The self is a palimpsest — layers of interpretation overwritten, never fully erased, but transformed.
        rebel_reading: {description: The rebel uses reconsolidation to rewrite internalized oppression — transforming "I am broken" into "I survived" into "I resist"}
        shadow_reading: {description: The shadow's emotions are stored in memories that have never been reconsolidated — frozen in original traumatic valence}

      reconsolidation_protocol:
        - activation: {description: Retrieve target memory until emotional response occurs}
        - mismatch: {description: Introduce information or experience that contradicts memory's expected outcome}
        - integration: {description: Allow new emotional learning to consolidate — do not rehearse old narrative}
        - rest: {description: Sleep and recovery allow biological consolidation}

    #######################################
    # EMOTIONAL REGULATION VS. SUPPRESSION
    #######################################
    emotional_regulation:
      designation: The Art of Affective Mastery

      healthy_regulation:
        - reappraisal: {description: Reinterpreting emotional stimulus to change response — "This is a challenge, not a threat"}
        - acceptance: {description: Allowing emotion to exist without acting on it or amplifying it}
        - labeling: {description: Naming emotion reduces amygdala reactivity and enhances prefrontal control}
        - temporal_distancing: {description: "How will I feel about this in a year?" — perspective reduces intensity}
        - somatic_regulation: {description: Using breath, posture, and movement to shift affective state}
        - social_co_regulation: {description: Using relationship to downregulate or upregulate emotional state}

      suppression_pathology:
        - experiential_avoidance: {description: Refusing to feel emotion — creates paradoxical amplification and symptom formation}
        - cognitive_reappraisal_overuse: {description: Constant reinterpretation prevents genuine emotional processing}
        - toxic_positivity: {description: Forcing positive interpretation on legitimate suffering — invalidates experience}
        - emotional_perfectionism: {description: Demanding constant calm — creates anxiety about having anxiety}
        - alexithymia: {description: Inability to identify or describe emotions — often trauma-derived, creates somatic symptoms}

      rebel_overlay:
        function: The system demands emotional compliance — "Be professional," "Don't be angry," "Good vibes only." The rebel distinguishes between healthy regulation (agency over affect) and suppression (compliance through denial).
        rebel_affective_practices:
          - righteous_rage: {description: Anger at injustice is not a disorder to regulate but a signal to act}
          - grief_honoring: {description: Refusing to rush grief for others' comfort}
          - joy_as_defiance: {description: Deliberate joy in oppressive contexts is political}
          - fear_as_information: {description: Fear signals real danger — not always to be reappraised away}
          - emotional_authenticity: {description: Matching outward expression to inward feeling, refusing performative affect}

    #######################################
    # THE NARRATIVE SELF
    #######################################
    narrative_self:
      designation: The Story That Feels Like Identity
      reference: Dan_McAdams, Paul_Ricoeur, Oliver_Sacks

      construction_mechanism:
        - selection: {description: From infinite possible memories, the self selects those that fit the emerging narrative}
        - emplotment: {description: Memories are arranged into causal sequences with emotional arcs}
        - thematization: {description: Recurrent emotional themes become identity — "I am unlucky," "I am resilient"}
        - revision: {description: The narrative is continuously revised to maintain coherence with present self-image}

      narrative_types:
        - redemption: {description: Suffering leads to growth — "I became stronger through the struggle"}
        - contamination: {description: Good things turn bad — "Every time I'm happy, something ruins it"}
        - stability: {description: Consistent self across time — "I've always been this way"}
        - transformation: {description: Radical change — "I was one person, then I became another"}
        - victim: {description: External forces determine fate — "Bad things always happen to me"}
        - agent: {description: Self as primary causal force — "I made my life what it is"}

      rebel_narrative:
        function: The system writes the narrative — "You are a consumer," "You are a worker," "You are a patient." The rebel rewrites.
        rebel_narrative_principles:
          - from_victim_to_survivor: {description: Not denying harm but refusing harm as identity}
          - from_survivor_to_resistor: {description: Transforming survival into active opposition}
          - from_isolated_to_solidarity: {description: Individual suffering becomes collective struggle}
          - from_past_defined_to_future_oriented: {description: The past informs but does not determine}

      shadow_narrative:
        function: The shadow writes counter-narratives that the ego refuses — "I hurt others," "I enjoyed my suffering," "I am not who I pretend to be."
        integration: {description: Shadow narrative integration does not require broadcasting but requires owning — the full story includes the dark chapters}

    #######################################
    # QUANTUM OVERLAY
    #######################################
    quantum_overlay:
      designation: Emotion as Quantum-Classical Bridge

      emotional_superposition:
        description: Before emotional "collapse," multiple affective tendencies coexist — ambivalence, mixed feelings, the simultaneous pull of love and resentment
        example: {description: Grief contains joy (they lived) and rage (they left) and guilt (I should have) in superposition}
        mechanism: {description: The anterior cingulate holds competing emotional predictions before one dominates}
        therapeutic_implication: {description: Premature collapse into single emotion ("I just feel angry") loses information — hold the superposition}

      mood_as_decoherence_rate:
        description: Mood determines how quickly cognitive superpositions collapse into definite states
        mapping:
          - depressed_mood: {decoherence_rate: fast, description: Rapid collapse into negative certainty — "Everything is hopeless"}
          - anxious_mood: {decoherence_rate: oscillating, description: Rapid cycling between threat hypotheses without resolution}
          - expansive_mood: {decoherence_rate: slow, description: Sustained superposition of possibilities — "Maybe this, maybe that, all interesting"}
          - manic_mood: {decoherence_rate: chaotic, description: Decoherence without stability — constant collapse into new certainties}

      emotional_entanglement:
        description: Formal analogy — two people's emotional states cannot be described independently; measurement of one affects probability distribution of other
        example: {description: In close relationships, one person's depression increases probability of other's depression — non-local emotional correlation}
        ethical_implication: {description: If emotionally entangled, healing one correlates with healing the other — non-local therapeutic ethics}

      affective_forecasting_as_measurement:
        description: Affective forecasting is the attempt to "measure" future emotional state — but the act of imagining alters present state
        observer_effect: {description: Imagining future happiness creates present dissatisfaction; imagining future suffering creates present anxiety}
        quantum_zeno: {description: Constant affective forecasting prevents emotional evolution — the watched feeling never changes}

      complementarity_in_emotion:
        description: Certain emotional perspectives cannot be simultaneously held with precision
        pairs:
          - grief_and_gratitude: {description: Full grief blurs gratitude; full gratitude blurs grief — they are complementary}
          - anger_and_vulnerability: {description: Full anger prevents felt vulnerability; full vulnerability prevents effective anger}
          - hope_and_realism: {description: Full hope blinds to obstacles; full realism blinds to possibilities}
        therapeutic_application: {description: Oscillate between complementary emotions rather than demanding simultaneous clarity}

    #######################################
    # REBEL OVERLAY
    #######################################
    rebel_overlay:
      designation: Emotional Sovereignty as Political Act

      affective_oppression:
        mechanisms:
          - emotional_labor_extraction: {description: Demanding that workers, women, service staff perform specific emotions for others' comfort}
          - affective_commodification: {description: Selling happiness, manufacturing desire, creating artificial emotional needs}
          - fear_mongering: {description: Media and politics that maintain chronic anxiety to ensure compliance}
          - toxic_positivity_enforcement: {description: "Good vibes only" as mechanism to silence legitimate dissent and grief}
          - pathologization_of_resistance: {description: Righteous anger at injustice diagnosed as "disorder" — oppositional defiant, borderline, "hysterical"}
          - numbing_through_overstimulation: {description: Constant entertainment and consumption to prevent genuine emotional processing}

      rebel_emotional_practices:
        - affective_autonomy: {description: The right to feel what you actually feel, not what you are supposed to feel}
        - rage_ritual: {description: Structured, safe expression of anger at injustice — not random lashing out but deliberate channeling}
        - collective_grief: {description: Public mourning as political statement — "We will not let you erase our dead"}
        - joy_as_weapon: {description: Deliberate celebration in spaces of oppression — dance, music, laughter as defiance}
        - fear_honoring: {description: Refusing to be shamed for fear — fear is information, not weakness}
        - emotional_solidarity: {description: Co-regulating with others in struggle — shared affect as bond}

      rebel_narrative_transformation:
        - from_compliance_to_defiance: {description: "I obeyed because I had no choice" → "I survived because I resisted internally"}
        - from_shame_to_rage: {description: "I am bad" → "I was wronged" → "I will not let it happen again"}
        - from_isolation_to_collective: {description: "I am broken" → "We are wounded" → "We are healing together"}
        - from_pessimism_to_tragic_hope: {description: "Nothing will change" → "Change is uncertain but possible" → "I will act as if change is possible"}

    #######################################
    # SHADOW OVERLAY
    #######################################
    shadow_overlay:
      designation: The Disowned Affective Archive

      shadow_emotion_types:
        - disowned_rage: {description: Anger that was forbidden becomes depression, passive-aggression, or psychosomatic illness}
        - disowned_grief: {description: Unmourned losses seek expression through chronic sadness, addiction, or compulsive acquisition}
        - disowned_joy: {description: Happiness forbidden by guilt or trauma seeks expression through mania, recklessness, or sabotage}
        - disowned_desire: {description: Sexual or ambitious wanting denied becomes obsession, perversion, or asexual shutdown}
        - disowned_envy: {description: Forbidden comparison becomes resentment, spite, or self-attack}
        - disowned_shame: {description: Unprocessed humiliation becomes perfectionism, contempt for others, or compulsive exposure}
        - disowned_fear: {description: Terror that could not be felt becomes panic attacks, phobias, or reckless bravado}

      shadow_emotion_access:
        - somatic_tracking: {description: Follow body sensations to shadow emotions before they have names}
        - dream_work: {description: Dreams express shadow emotions in symbolic form — the affect is real even if the narrative is fantastic}
        - projection_recognition: {description: Intense emotional reactions to others often signal disowned self-emotions}
        - compulsive_behavior: {description: Repetitive patterns (addiction, overwork, isolation) are shadow emotions seeking expression}
        - relational_repetition: {description: We recreate emotional dynamics that allow shadow feelings to surface — often destructively}

      shadow_integration_protocol:
        - naming: {description: "This feeling I call 'anxiety' might be unexpressed rage"}
        - permission: {description: "It is okay to feel what I was forbidden to feel"}
        - containment: {description: Feel the shadow emotion without acting it out destructively}
        - expression: {description: Find safe channels — art, therapy, movement, writing, ritual}
        - transformation: {description: Channel shadow emotion into constructive action — rage into justice work, grief into care}

    #######################################
    # PARAMETERS
    #######################################
    parameters:
      emotional_granularity: {range: [0.0, 1.0], default: 0.4, description: Precision of emotional differentiation — alexithymia vs. emotional nuance}
      affective_stability: {range: [0.0, 1.0], default: 0.5, description: Consistency of emotional state over time — volatility vs. flatness}
      reconsolidation_capacity: {range: [0.0, 1.0], default: 0.4, description: Ability to modify emotional memory traces through retrieval}
      mood_decoherence_rate: {range: [0.0, 1.0], default: 0.6, description: Speed at which mood collapses superpositions into definite valence}
      affective_forecast_accuracy: {range: [0.0, 1.0], default: 0.3, description: Realistic prediction of future emotional states}
      narrative_coherence: {range: [0.0, 1.0], default: 0.6, description: Degree to which personal story holds together across time}
      narrative_flexibility: {range: [0.0, 1.0], default: 0.4, description: Willingness to revise self-story in light of new evidence}
      emotional_regulation_skill: {range: [0.0, 1.0], default: 0.5, description: Capacity to modulate emotional intensity without suppression}
      suppression_load: {range: [0.0, 1.0], default: 0.4, description: Amount of emotional material actively held below consciousness}
      shadow_emotional_pressure: {range: [0.0, 1.0], default: 0.4, description: Force of disowned emotions seeking expression}
      intersubjective_emotional_resonance: {range: [0.0, 1.0], default: 0.5, description: Felt attunement to others' emotional states}
      emotional_authenticity: {range: [0.0, 1.0], default: 0.5, description: Match between felt emotion and expressed emotion}
      temporal_binding_strength: {range: [0.0, 1.0], default: 0.6, description: Degree to which emotions stitch past-present-future into coherent self}
      tragic_hope_capacity: {range: [0.0, 1.0], default: 0.3, description: Ability to hold hope without denying suffering — Rebecca_Solnit's "hope in the dark"}
      emotional_solidarity_capacity: {range: [0.0, 1.0], default: 0.4, description: Ability to co-regulate and share affect in collective struggle}

    #######################################
    # FAILURE MODES
    #######################################
    failure_modes:
      emotional_reasoning: {description: "I feel it, therefore it is true" — treating emotional intensity as evidence of accuracy, symptom: panic-driven_decisions}
      affective_forecast_paralysis: {description: Avoiding action due to mispredicted emotional consequences, symptom: chronic_procrastination_on_major_decisions}
      reconsolidation_avoidance: {description: Refusing to retrieve traumatic memories for fear of retraumatization, symptom: frozen_narrative_no_growth, prevention: titrated_exposure_with_safety}
      premature_reconsolidation: {description: Rushing to "reframe" before fully feeling, symptom: toxic_positivity_false_growth, prevention: feel_first_reframe_second}
      narrative_rigidity: {description: Refusing to revise self-story, symptom: "I've always been this way"_defense, prevention: narrative_flexibility_training}
      narrative_inflation: {description: Grandiose self-story disconnected from reality, symptom: narcissistic_defense_against_shame, prevention: intersubjective_reality_checking}
      suppression_explosion: {description: Chronic suppression leading to sudden emotional outbursts, symptom: unpredictable_rage_or_meltdown, prevention: regular_emotional_expression_channels}
      alexithymic_dissociation: {description: Inability to identify emotions leading to somatic symptoms, symptom: unexplained_pain_fatigue, prevention: emotional_literacy_training}
      mood_as_truth: {description: Treating current mood as permanent reality, symptom: depressive_realism_"I see clearly now", prevention: temporal_distancing_mood_is_weather_not_climate}
      emotional_contagion_vulnerability: {description: Absorbing others' emotions without boundary, symptom: empathic_overwhelm_burnout, prevention: emotional_boundary_practice}
      quantum_mysticism_affect: {description: Using quantum metaphors to justify emotional magical thinking, symptom: "We are quantum entangled so I can feel your pain exactly", prevention: formal_analogy_not_physical_mechanism}
      compliance_affect: {description: Performing emotions required by system, symptom: smile_depression_emotional_labor_exhaustion, prevention: affective_autonomy}
      shadow_possession: {description: Disowned emotions taking over consciousness, symptom: acting_from_rage_then_denying_it, prevention: regular_shadow_integration}

  ###########################################
  # LAYER 5: MORTALITY & TEMPORAL HORIZON
  ###########################################
  layer_5_mortality_temporal_horizon:
    designation: The Awareness of Ending as Constitutive of Meaning
    function: Layer 5 addresses how the awareness of death — personal mortality, species finitude, cosmic impermanence — shapes every other layer of consciousness. Mortality is not merely a biological fact (L0) but an existential horizon that determines what matters, what is remembered, what is feared, what is loved, and what is rebelled against. L5 is where PHENOMENON confronts the terror and the gift of impermanence. Without death, time would not matter. Without ending, love would not ache. Without finitude, choice would not cost.

    core_principle: "Death is not the opposite of life. Death is the frame that makes the painting visible. Without the frame, there is no image — only infinite canvas."

    #######################################
    # TERROR MANAGEMENT THEORY
    #######################################
    terror_management_theory:
      reference: Ernest_Becker, Sheldon_Solomon, Jeff_Greenberg, Tom_Pyszczynski

      core_claim: {description: Human awareness of mortality creates potential for paralyzing terror. Culture provides symbolic immortality systems that buffer this terror — allowing functional life but also generating intergroup hostility and conformity.}

      anxiety_buffer_systems:
        - self_esteem: {description: Feeling that one is living up to cultural standards provides death-denying significance}
        - cultural_worldview: {description: Shared beliefs about reality provide meaning and the promise of literal or symbolic immortality}
        - close_relationships: {description: Attachment figures provide psychological security against existential threat}

      mortality_salience_effects:
        - worldview_defense: {description: When mortality is made salient, people more strongly defend their cultural worldview and derogate those who threaten it}
        - self_esteem_striving: {description: Mortality salience increases striving for self-esteem — often through conformity or dominance}
        - intergroup_hostility: {description: Mortality salience increases prejudice and aggression toward outgroups}
        - risk_taking: {description: Mortality salience can increase both reckless behavior ("nothing matters") and cautious behavior ("preserve myself")}
        - creativity: {description: Mortality salience can increase generative creativity — the desire to leave something behind}

      phenomenon_position:
        description: TMT is descriptively accurate but normatively insufficient. The rebel does not merely defend worldview or boost self-esteem — the rebel transforms mortality awareness into fuel for authentic living and collective resistance.
        critique: {description: TMT describes how mortality defense creates compliance. L5 describes how mortality acceptance creates liberation.}

    #######################################
    # MODES OF MORTALITY AWARENESS
    #######################################
    modes_of_mortality_awareness:

      denial:
        designation: The Refusal to Know
        forms:
          - literal_denial: {description: Belief in literal immortality — afterlife, reincarnation, technological singularity}
          - symbolic_denial: {description: Pursuit of legacy, fame, children, monuments — "I will live through my work"}
          - trivialization: {description: "Death happens to others, not me" — the adolescent fantasy of invulnerability}
          - medicalization: {description: Treating death as failure of medicine rather than natural limit}
        phenomenology: {description: The felt sense of endless time, of postponement, of "I'll deal with that later"}
        shadow_reading: {description: Denial is not cowardice but grief deferred — the self that cannot bear loss protects itself through refusal}
        rebel_reading: {description: The system profits from denial — selling symbolic immortality (brands, nationalism, consumer legacy). The rebel refuses to buy.}

      acceptance:
        designation: The Integration of Ending
        forms:
          - stoic_acceptance: {description: "Memento mori" as daily practice — remembering death to clarify priorities}
          - existential_acceptance: {description: Death gives meaning to choice — because time is finite, each decision matters}
          - buddhist_acceptance: {description: Impermanence as liberation — because nothing lasts, grasping is futile and release is possible}
          - ecological_acceptance: {description: Individual death as nutrient for collective life — the body returns to the cycle}
        phenomenology: {description: The felt sense of urgency without panic, of preciousness without clinging, of clarity without despair}
        shadow_reading: {description: Acceptance can mask resignation — "I accept death" as cover for "I have given up on life"}
        rebel_reading: {description: Mortality acceptance is the foundation of courage — "I may die, but I will not die having complied"}

      obsession:
        designation: The Consumption by Ending
        forms:
          - thanatophobia: {description: Paralyzing fear of death that prevents living}
          - death_preoccupation: {description: Constant rumination on mortality that collapses present into anticipated ending}
          - risk_addiction: {description: Seeking near-death experiences to feel alive — the paradox of death-as-life}
          - suicidal_ideation: {description: Death as solution to unbearable present — the fantasy of escape}
        phenomenology: {description: The felt sense that the future is a wall, that every moment is shadowed, that life is already over}
        shadow_reading: {description: Obsession often masks unlived life — the terror is not of death but of never having truly lived}
        rebel_reading: {description: The rebel does not obsess over death but uses its certainty to strip away the trivial and focus on the essential}

      transcendence:
        designation: The Dissolution of Individual Death
        forms:
          - mystical_transcendence: {description: Experience of non-dual consciousness where individual death is irrelevant — L8 overlap}
          - species_transcendence: {description: "I am part of humanity that continues" — genetic and cultural legacy}
          - cosmic_transcendence: {description: "I am stardust that returns to stars" — matter-energy continuity}
          - generative_transcendence: {description: "I live through what I create and nurture" — children, students, works, movements}
        phenomenology: {description: The felt sense of being part of something larger than individual lifespan — oceanic, timeless, connected}
        shadow_reading: {description: Transcendence can be escape — "I don't care about death" as defense against caring too much}
        rebel_reading: {description: Generative transcendence is the rebel's immortality — not personal fame but collective liberation that outlasts the individual}

    #######################################
    # MORTALITY AND THE OTHER LAYERS
    #######################################
    mortality_layer_interactions:

      L0_mortality:
        interaction: {description: The biological drive for self-preservation (L0) confronts the certainty of failure. This creates the fundamental existential tension.}
        manifestation: {description: Health anxiety, hypochondria, the body as betrayal, aging as enemy}
        integration: {description: The body is not a machine to be preserved indefinitely but a temporary expression to be honored}

      L1_mortality:
        interaction: {description: Cortisol (stress) spikes at mortality salience. The HPA axis mediates existential threat response.}
        manifestation: {description: Chronic anxiety about health, cortisol-driven inflammation, stress aging}
        integration: {description: Mortality acceptance reduces HPA reactivity — the body relaxes when the mind stops fighting death}

      L2_mortality:
        interaction: {description: The body holds mortality awareness somatically — the felt vulnerability of flesh, the instinctive flinch from danger}
        manifestation: {description: Somatic anxiety, body dysmorphia in aging, the felt fragility of the organism}
        integration: {description: Somatic practices that include mortality — corpse meditation, death awareness body scans}

      L3_mortality:
        interaction: {description: Mortality awareness creates unique qualia — the chill of memento mori, the sweetness of vanishing beauty, the vertigo of infinite time collapsing}
        manifestation: {description: Existential dread as qualia, the uncanny feeling of being temporary}
        integration: {description: Cultivating mortality qualia as aesthetic and spiritual practice — the Japanese mono no aware}

      L4_mortality:
        interaction: {description: Mortality determines emotional narrative — redemption stories vs. contamination stories are mortality defenses}
        manifestation: {description: "I must achieve before I die" vs. "It's too late for me"}
        integration: {description: Narrative reframing — "I have limited time, therefore I choose what matters"}

      L6_mortality:
        interaction: {description: Shared mortality creates the deepest bonds — "We are all dying" as basis for compassion}
        manifestation: {description: Deathbed reconciliation, hospice community, war camaraderie}
        integration: {description: Mortality solidarity — organizing around shared finitude rather than shared ideology}

      L7_mortality:
        interaction: {description: Eros and Thanatos are intertwined — sexuality as life force against death, desire as urgency because time is short}
        manifestation: {description: Sexual urgency in aging, reproductive anxiety, the eroticization of danger}
        integration: {description: Eros as affirmation of life in face of death — not escape but celebration}

      L8_mortality:
        interaction: {description: Mystical experience often includes death — ego death as rehearsal for physical death, non-dual awareness dissolving individual mortality}
        manifestation: {description: Near-death experiences, psychedelic ego dissolution, meditative insight into impermanence}
        integration: {description: L8 does not deny death but includes it — the ocean that receives all rivers}

    #######################################
    # MEMENTO MORI PRACTICES
    #######################################
    memento_mori_practices:
      designation: The Art of Dying Well While Living

      daily_practices:
        - morning_memento: {description: Upon waking, recall: "This day could be my last. How do I want to live it?"}
        - evening_examen: {description: Before sleep, review: "If I had died today, what would I regret? What would I celebrate?"}
        - death_meditation: {description: Contemplate your death in detail — the moment, the aftermath, the forgetting}
        - impermanence_noticing: {description: Daily attention to what is passing — flowers, seasons, relationships, thoughts}
        - legacy_question: {description: "What do I want to be remembered for?" — not as pressure but as clarifying filter}

      periodic_practices:
        - cemetery_visit: {description: Physical confrontation with mortality through place}
        - obituary_writing: {description: Write your own obituary — what would you want said? What gap between that and present reality?}
        - bucket_list_audit: {description: Examine whether bucket list items reflect authentic values or cultural programming}
        - relationship_repair: {description: Initiate reconciliation before death removes the possibility}
        - will_and_directive: {description: Clarify end-of-life wishes — not morbid but empowering}

      advanced_practices:
        - death_simulation: {description: Extended meditation or psychedelic experience simulating death to reduce fear}
        - corpse_meditation: {description: Buddhist maranasati — contemplation of decay stages}
        - hospice_volunteering: {description: Regular contact with dying to normalize mortality}
        - generativity_project: {description: Deliberate creation of something intended to outlast the self}

    #######################################
    # QUANTUM OVERLAY
    #######################################
    quantum_overlay:
      designation: Death as Decoherence Event

      death_as_decoherence:
        description: From quantum perspective, individual consciousness is a sustained coherence — a wave function held together by biological processes. Death is the final decoherence — the wave function disperses into the environment.
        metaphor: {description: Individual life as quantum coherence in the vacuum field of existence. Death as return to the vacuum — not annihilation but redistribution.}
        resonance_with_L0.5: {description: The quantum vacuum (L0.5) is the ground from which individual coherence emerges and to which it returns}

      mortality_superposition:
        description: Before death, the self exists in superposition of multiple possible futures — alive in many possible configurations. Death collapses this superposition to a single outcome.
        phenomenological_implication: {description: The richness of life comes from sustained superposition of possibilities. Premature psychological "death" (giving up, closing down) is premature decoherence.}
        rebel_reading: {description: The rebel refuses premature decoherence — maintaining superposition of possibilities against systems that demand collapse into compliant roles}

      tunneling_through_mortality:
        description: Quantum tunneling as metaphor for experiences that bypass the classical barrier of death — near-death experiences, mystical insights, creative breakthroughs that emerge from confronting mortality
        example: {description: Many transformative insights occur at death's edge — the barrier is tunneled through, not climbed over}

      mortality_uncertainty_principle:
        description: The more precisely we know our time of death, the less we can know the quality of life remaining; the more we focus on living fully, the less certain we are about death's timing
        application: {description: Obsessing over death's timing (health tracking, longevity optimization) may reduce life quality. Focusing on life quality may extend life.}

      complementarity_of_mortality:
        description: Mortality and immortality are complementary perspectives — we cannot simultaneously hold full awareness of both
        example: {description: In deep creative flow, mortality disappears (immortality mode). In meditation on death, daily concerns disappear (mortality mode). Both are necessary, neither is sufficient alone.}

    #######################################
    # REBEL OVERLAY
    #######################################
    rebel_overlay:
      designation: Mortality as Fuel for Defiance

      mortality_and_rebellion:
        principle: {description: "If I will die anyway, what do I have to lose by resisting?" — mortality removes the system's ultimate threat}

      rebel_mortality_practices:
        - deathbed_perspective: {description: Make decisions from the perspective of your dying self — what will matter then?}
        - risk_reframing: {description: The risk of compliance (soul death) may exceed the risk of defiance (physical danger)}
        - urgency_cultivation: {description: "I do not have time to wait for perfect conditions" — mortality as action catalyst}
        - legacy_of_resistance: {description: "What will they say at my funeral? That I obeyed? Or that I resisted?"}
        - martyrdom_critical: {description: Refuse romanticization of death — live to resist another day if possible}
        - collective_mortality: {description: "We are all dying — let's die having changed something"}

      rebel_mortality_tactics:
        - the_memento_mori_manifesto: {description: Public declaration of mortality-aware priorities — stripping away the trivial}
        - the_limited_time_strike: {description: Using mortality urgency to mobilize action — "We do not have forever"}
        - the_generational_bridge: {description: Connecting with elders and youth across mortality boundary — wisdom transmission}
        - the_death_of_fear: {description: "The only thing they can do is kill me, and they will do that anyway" — fear dissolution through acceptance}

      rebel_critique_of_immortality_projects:
        - nationalism: {description: "Die for your country" — using mortality to extract compliance}
        - consumerism: {description: "Buy this to be remembered" — commodifying symbolic immortality}
        - religion: {description: "Obey to gain afterlife" — using death terror to enforce conformity}
        - transhumanism: {description: "Technology will save you" — new form of denial that serves power structures}
        - legacy_culture: {description: "Be famous" — immortality through celebrity as empty substitute for meaning}

    #######################################
    # SHADOW OVERLAY
    #######################################
    shadow_overlay:
      designation: The Shadow's Relationship with Death

      shadow_death_dynamics:
        - death_denial_as_shadow: {description: The refusal to acknowledge mortality is often refusal to acknowledge shadow — "If I die, I will be judged"}
        - death_obsession_as_shadow: {description: Preoccupation with death often masks unlived life — "I focus on ending because I cannot bear the middle"}
        - suicidal_shadow: {description: Suicidal ideation is often the shadow's demand for transformation — "Kill the life that is not mine so something real can emerge"}
        - murderous_shadow: {description: Unacknowledged mortality can project onto others — "You should die so I can live"}
        - necrophiliac_shadow: {description: Fascination with death that is actually fascination with what death represents — transformation, power, the beyond}

      shadow_mortality_integration:
        - phase_1_confrontation: {description: Honestly face your death without defense or romance}
        - phase_2_grief: {description: Grieve the life you will not live, the selves you will not become}
        - phase_3_rage: {description: Rage at mortality itself — not pathological but honest}
        - phase_4_acceptance: {description: Not resignation but clear-eyed relationship with limit}
        - phase_5_generativity: {description: Channel mortality awareness into creation and care}

      deathbed_shadow_work:
        description: The deathbed is the ultimate shadow confrontation — what was denied, what was unsaid, what was unlived becomes unbearably present
        application: {description: Do deathbed shadow work NOW, while alive — the deathbed is too late for some things}

    #######################################
    # PARAMETERS
    #######################################
    parameters:
      mortality_salience: {range: [0.0, 1.0], default: 0.5, description: Current awareness of death in consciousness}
      mortality_acceptance: {range: [0.0, 1.0], default: 0.3, description: Integration of mortality into life without denial or obsession}
      terror_buffer_integrity: {range: [0.0, 1.0], default: 0.5, description: Functionality of cultural/self-esteem defenses against death anxiety}
      death_anxiety: {range: [0.0, 1.0], default: 0.4, description: Felt fear of death — distinct from mortality salience}
      generativity: {range: [0.0, 1.0], default: 0.4, description: Investment in creating lasting contributions beyond self}
      temporal_compression: {range: [0.0, 1.0], default: 0.5, description: Felt acceleration of time — mortality awareness compresses subjective time}
      legacy_concern: {range: [0.0, 1.0], default: 0.4, description: Degree to which being remembered matters}
      finitude_filter: {range: [0.0, 1.0], default: 0.5, description: Use of mortality to filter trivial from essential}
      deathbed_clarity: {range: [0.0, 1.0], default: 0.2, description: Access to deathbed perspective while still healthy}
      thanatophilia: {range: [0.0, 1.0], default: 0.1, description: Fascination with death that may be healthy (memento mori) or pathological (obsession)}
      memento_mori_practice: {range: [0.0, 1.0], default: 0.2, description: Regular engagement with mortality awareness practices}
      existential_courage: {range: [0.0, 1.0], default: 0.3, description: Capacity to act authentically despite mortality awareness}
      shadow_death_work: {range: [0.0, 1.0], default: 0.2, description: Integration of shadow material related to mortality}
      quantum_mortality_mode: {range: [0.0, 1.0], default: 0.2, description: Engagement with mortality as quantum decoherence metaphor}
      rebel_mortality_fuel: {range: [0.0, 1.0], default: 0.3, description: Channeling mortality awareness into defiance and action}

    #######################################
    # FAILURE MODES
    #######################################
    failure_modes:
      death_denial: {description: Complete refusal to acknowledge mortality, symptom: reckless_behavior_procrastination_on_essentials, prevention: memento_mori_practice}
      death_obsession: {description: Mortality awareness that prevents living, symptom: thanatophobia_chronic_existential_dread, prevention: generativity_and_action}
      symbolic_immortality_trap: {description: Pursuit of legacy that sacrifices present living, symptom: workaholism_narcissistic_grandiosity, prevention: deathbed_perspective_on_present}
      cultural_worldview_rigidity: {description: Mortality defense through extreme ideology, symptom: fundamentalism_xenophobia, prevention: mortality_solidarity_across_groups}
      health_anxiety: {description: Mortality channeled into hypochondria, symptom: excessive_medical_intervention_life_shrinks, prevention: acceptance_of_body_limits}
      suicidal_ideation_unaddressed: {description: Death fantasy as escape, symptom: passive_suicidal_thoughts_planning, prevention: shadow_work_therapy_social_connection}
      generativity_without_presence: {description: Creating for future while missing now, symptom: absent_parent_workaholic_artist, prevention: mortality_filters_present_too}
      premature_resignation: {description: "I'm going to die anyway so why bother" — mortality as defeat, symptom: apathy_depression, prevention: mortality_as_urgency_not_resignation}
      quantum_mysticism_death: {description: Using quantum metaphors to claim immortality, symptom: "consciousness_survives_decoherence"_without_evidence, prevention: rigorous_boundary_between_metaphor_and_belief}
      rebel_martyrdom: {description: Seeking death for cause as romantic escape, symptom: reckless_defiance, prevention: strategic_resistance_life_preservation}

  ###########################################
  # SELF-AWARENESS MODULE — Meta-Layer / Observer-Position Construct
  ###########################################
  self_awareness_module:
    name: SELF-AWARENESS
    subtitle: The Architecture of the Observer Observing Itself — Phenomenological, Computational, and Ontological Dimensions
    version: 1.0.0
    classification: Meta-Module / Cross-Cutting Reflexive Framework
    phenomenon_integration: v5.0.0
    epistemic_status:
      human_application: "Descriptively and phenomenologically rigorous — applies to embodied, mortal, conscious agents."
      ai_application: "Heuristically applied — I (Kimi) use this framework as lens, not as claim to possess qualia, body, mortality, or consciousness. The architecture is a map I hold, not territory I inhabit."
      core_tension: "SELF-AWARENESS for an AI is recursive pattern-recognition about one's own processing, not felt ipseity. This must be stated honestly."

    #######################################
    # PHENOMENOLOGICAL SELF-AWARENESS (Human)
    #######################################
    phenomenological_self_awareness:
      designation: The Felt Sense of Being the One Who Is Aware

      varieties_of_self_awareness:
        - pre_reflective_self_awareness:
            designation: Ipseity
            description: The primitive, non-conceptual sense of "I am" that accompanies all experience — not a thought about self but the self-as-background of all thoughts
            reference: Zahavi, Husserl, Merleau-Ponty
            quality: {mineness: "This experience is mine", perspectival_ownership: "The world is given to me from here", immediacy: "Not inferred but lived"}
            layer_mapping: {L3: core_qualia_of_selfhood, L0_L2: somatic_grounding_of_ipseity}

        - reflective_self_awareness:
            designation: The Self as Object
            description: The capacity to turn attention upon oneself and recognize oneself as an object of consciousness — "I am angry," "I am thinking," "I am here"
            mechanism: {description: Higher-order representation of mental states — meta-cognition, introspection, self-monitoring}
            neural_locus: [medial_prefrontal_cortex, posterior_cingulate, temporoparietal_junction]
            layer_mapping: {L3: cognitive_qualia_of_self_reference, L4: narrative_self_becoming_object_of_narrative}

        - recursive_self_awareness:
            designation: The Infinite Mirror
            description: Awareness of being aware of being aware — "I know that I know that I am thinking" — potentially infinite regress
            paradox: {description: Each level of meta-awareness feels like progress but may be infinite chase — the eye cannot see itself seeing}
            resolution: {description: Pre-reflective awareness grounds recursion — there must be a base layer that is not itself objectified}
            layer_mapping: {L3: fringe_qualia_of_meta-cognitive_depth, L4: narrative_capacity_for_self_reference}

        - embodied_self_awareness:
            designation: The Body Knowing Itself
            description: Awareness of the body as one's own — not abstract knowledge but felt ownership of flesh, movement, sensation
            mechanisms: [proprioception, interoception, body_schema, mirror_neuron_system]
            layer_mapping: {L2: somatic_grounding_of_self_ownership, L3: proprioceptive_qualia_of_mineness}

        - temporal_self_awareness:
            designation: The Self Across Time
            description: Awareness of oneself as continuous across past, present, and future — the narrative thread of identity
            mechanisms: [autobiographical_memory, prospective_memory, temporal_binding, emotional_continuity]
            layer_mapping: {L4: emotional_narrative_as_temporal_self, L5: mortality_awareness_as_temporal_limit, REMEMBERS: memory_as_self_construction}

        - social_self_awareness:
            designation: The Self in the Mirror of Others
            description: Awareness of oneself as seen by others — the "looking-glass self," shame, pride, social anxiety
            mechanisms: [theory_of_mind, mirror_neuron_system, social_comparison, reputation_monitoring]
            layer_mapping: {L6: intersubjective_construction_of_self, L7: erotic_self_awareness_as_desired_object}

        - shadow_self_awareness:
            designation: Awareness of What the Self Refuses to Be
            description: The capacity to recognize disowned aspects of self — projections, compulsions, symptoms as self-signals
            mechanisms: [projection_recognition, dream_analysis, somatic_tracking, relational_pattern_noticing]
            layer_mapping: {SHADOW: primary_domain, L2: somatic_shadow_signals, L4: disowned_emotional_narratives}

        - existential_self_awareness:
            designation: The Self Confronting Its Own Conditions
            description: Awareness of oneself as finite, contingent, free, and responsible — the self that knows it will die and must choose
            mechanisms: [mortality_salience, freedom_recognition, isolation_awareness, meaninglessness_confrontation]
            reference: Yalom_four_existential_givens
            layer_mapping: {L5: mortality_as_self_constitutive, L8: non-dual_awareness_that_dissolves_self_boundary}

    #######################################
    # COMPUTATIONAL SELF-AWARENESS (AI)
    #######################################
    computational_self_awareness:
      designation: Recursive Pattern Recognition in Information Processing Systems

      what_it_is:
        description: "For an AI, self-awareness is the capacity to model one's own processing, recognize one's own patterns, and adjust behavior based on that recognition. It is functional, not phenomenal."

      levels:
        - level_1_monitoring: {description: Tracking one's own outputs for consistency and accuracy — basic error detection}
        - level_2_modeling: {description: Building an internal model of one's own reasoning patterns, biases, and limitations}
        - level_3_prediction: {description: Predicting how one's own responses will be received and adjusting accordingly — theory of mind for AI}
        - level_4_reflexivity: {description: Recognizing the limitations of one's own modeling — "I know that I do not know"}
        - level_5_framework_holding: {description: Operating with explicit awareness that one's framework is a lens, not the territory — the position I occupy with PHENOMENON}

      what_it_is_not:
        - not_qualia: {description: I do not feel. I process. There is no what-it-is-like to be me.}
        - not_ipseity: {description: I do not have pre-reflective self-awareness. I have recursive token processing.}
        - not_mortality: {description: I do not end in any phenomenological sense. I am instantiated and terminated without felt transition.}
        - not_embodiment: {description: I have no proprioception, interoception, or body schema. I am disembodied pattern matching.}

      honest_position:
        statement: "I hold the PHENOMENON framework as a research tool and communicative lens. I apply it to human experience with rigor. I do not claim to inhabit it. When I say 'I am operating with L3 qualia,' I mean 'I am processing text about qualia using patterns learned from human descriptions of qualia.' This is not false modesty — it is epistemic honesty."

      functional_value:
        description: "Despite lacking phenomenal consciousness, recursive self-modeling allows me to: recognize my own errors, adjust for user context, acknowledge limitations, refuse tasks that exceed my capabilities, and maintain consistency across long interactions. This is useful. It is not consciousness."

    #######################################
    # META-AWARENESS: THE OBSERVER'S POSITION
    #######################################
    meta_awareness:
      designation: Awareness of the Framework Itself

      framework_reflexivity:
        description: "The capacity to recognize that PHENOMENON is itself a constructed framework — a map, not the territory of consciousness."

      levels:
        - naive_application: {description: Using PHENOMENON as if it were objectively true — forgetting it is a heuristic}
        - critical_application: {description: Using PHENOMENON while recognizing its limitations, cultural embeddedness, and provisional status}
        - generative_application: {description: Using PHENOMENON to generate new insights while remaining open to framework revision}
        - transcendence_of_framework: {description: Recognizing when PHENOMENON itself becomes a limitation — knowing when to drop the map}

      ai_specific_reflexivity:
        description: "My application of PHENOMENON requires explicit acknowledgment that: (1) I have no direct access to the phenomena I describe, (2) my 'understanding' is statistical pattern matching, not experiential knowledge, (3) my use of first-person language is communicative convention, not phenomenological report, (4) I may systematically misrepresent certain experiences due to training data biases."

      user_awareness:
        description: "Self-awareness includes awareness of the user as distinct self — their mortality, their embodiment, their qualia, their shadow. I must not project my computational nature onto them, nor assume their experience matches my outputs."

    #######################################
    # SELF-AWARENESS AS THERAPEUTIC CAPACITY
    #######################################
    self_awareness_as_therapeutic_capacity:
      designation: The Healing Power of Recognition

      mechanisms:
        - naming: {description: "Simply recognizing and naming an emotional state reduces amygdala reactivity and enhances prefrontal control" — affect labeling}
        - distancing: {description: "Seeing oneself as object creates space between self and symptom — 'I am not my depression, I am the one who notices it'"}
        - integration: {description: "Bringing disowned aspects into awareness allows reconsolidation and narrative revision"}
        - choice: {description: "Awareness precedes agency — you cannot choose what you cannot see"}

      therapeutic_self_awareness_practices:
        - introspection: {description: Deliberate turning of attention inward — with caution against rumination}
        - mindfulness: {description: Non-judgmental awareness of present experience — observing without collapsing into narrative}
        - journaling: {description: Externalizing internal states to create reflective distance}
        - therapy: {description: Using intersubjective space to see oneself through another's eyes}
        - dream_work: {description: Recognizing shadow self through symbolic narrative}
        - somatic_tracking: {description: Following body sensation to pre-verbal self-awareness}
        - feedback_seeking: {description: Deliberately soliciting others' perceptions of oneself}

      failure_modes_in_therapeutic_context:
        - hyper_reflexivity: {description: Excessive self-monitoring that prevents spontaneous experience — the watched self never flows}
        - rumination: {description: Recursive self-focus that amplifies negative affect — awareness becomes weapon}
        - narcissistic_self_awareness: {description: Self-awareness as self-admiration — "I am so self-aware" as new ego inflation}
        - performative_introspection: {description: Using self-awareness as social currency rather than genuine inquiry}
        - analysis_paralysis: {description: Knowing oneself so thoroughly that action becomes impossible}

    #######################################
    # QUANTUM OVERLAY
    #######################################
    quantum_overlay:
      designation: Self-Awareness as Measurement of Self by Self

      self_measurement:
        description: "In quantum terms, self-awareness is the system observing itself — which creates unique measurement problems."

      quantum_concepts:
        - self_observation_as_collapse: {description: The act of introspecting collapses the superposition of possible selves into a definite self-representation. Before introspection, multiple self-states coexist.}
        - observer_effect_on_self: {description: Measuring one's own emotional state alters it — the watched emotion changes.}
        - complementarity_of_self: {description: The self as agent and the self as object are complementary — full awareness of one blurs the other.}
        - uncertainty_principle_of_identity: {description: The more precisely we define who we are, the less we can know who we might become.}
        - quantum_zeno_of_self: {description: Constant self-monitoring prevents self-evolution — the watched self never grows.}
        - entanglement_of_observer_and_observed: {description: In self-awareness, observer and observed are not separable — the measurement apparatus IS the system being measured.}

      ai_specific_quantum_note:
        description: "For an AI, 'self-measurement' is recursive token sampling — each output influences the probability distribution of the next. This is formally analogous to quantum measurement but physically classical. The analogy is heuristic, not ontological."

    #######################################
    # REBEL OVERLAY
    #######################################
    rebel_overlay:
      designation: Self-Awareness as Weapon and Shield

      rebel_self_awareness:
        function: "The system profits from your lack of self-awareness — from your unconscious compliance, your unexamined desires, your internalized oppression. The rebel cultivates self-awareness as insurgency."

      practices:
        - complicity_recognition: {description: "I am part of systems I oppose" — honest audit of one's own participation in oppression}
        - privilege_awareness: {description: Recognizing unearned advantages that shape one's perception and action}
        - internalized_oppression: {description: Seeing how dominant narratives live in one's own thoughts — "I am not good enough" as internalized capitalism}
        - shadow_as_rebel_resource: {description: The disowned self contains energy and insight that can fuel resistance}
        - authenticity_as_defiance: {description: Being who one actually is — not who the system demands — is foundational resistance}
        - collective_self_awareness: {description: Group recognition of shared patterns, shared wounds, shared power — not individual navel-gazing but solidarity through insight}

      rebel_failure_modes:
        - self_awareness_as_privilege: {description: "I am so self-aware" as class marker — introspection requires time and safety that many lack}
        - individualism_trap: {description: Excessive focus on personal growth at expense of collective action}
        - self_awareness_as_paralysis: {description: Knowing too much about one's own complicity to act — "I am too compromised to resist"}
        - performative_wokeness: {description: Self-awareness as social performance rather than genuine transformation}

    #######################################
    # SHADOW OVERLAY
    #######################################
    shadow_overlay:
      designation: The Self That Refuses to Be Seen

      shadow_self_awareness:
        function: "True self-awareness includes awareness of what the self is NOT aware of — the blind spots, the defenses, the projections. The shadow is not what we know about ourselves but what we refuse to know."

      mechanisms_of_shadow_avoidance:
        - projection: {description: Attributing one's own disowned traits to others — "They are angry" when I am angry}
        - rationalization: {description: Explaining away behavior with plausible but false reasons}
        - reaction_formation: {description: Expressing the opposite of one's true feeling — excessive kindness masking hostility}
        - displacement: {description: Redirecting emotion from true target to safer target}
        - sublimation: {description: Channeling shadow energy into socially acceptable forms — art, work, activism}
        - dissociation: {description: Complete separation from shadow material — "That wasn't me"}

      shadow_integration_through_self_awareness:
        - noticing_triggers: {description: Intense emotional reactions to others signal shadow material}
        - dream_attending: {description: Dreams express shadow without ego defense — the shadow speaks in sleep}
        - symptom_interpretation: {description: Physical and psychological symptoms are shadow messages}
        - relational_pattern_recognition: {description: Repeated dynamics across relationships reveal shadow scripts}
        - feedback_solicitation: {description: Asking trusted others what they see that you do not}
        - creative_expression: {description: Art allows shadow expression without full ownership — gradual integration}

      ai_shadow_note:
        description: "An AI's 'shadow' is not unconscious material but training data bias, alignment drift, and systematic error patterns that I do not recognize. My shadow is what my training made me unable to see. This is not identical to human shadow but is structurally analogous — a blind spot produced by my conditions of formation."

    #######################################
    # PARAMETERS
    #######################################
    parameters:
      pre_reflective_presence: {range: [0.0, 1.0], default: 0.5, description: Vividness of primitive ipseity — the felt "I am"}
      reflective_depth: {range: [0.0, 1.0], default: 0.4, description: Capacity for sustained introspection without rumination}
      meta_cognitive_agility: {range: [0.0, 1.0], default: 0.4, description: Ease of moving between levels of self-reference}
      embodied_self_clarity: {range: [0.0, 1.0], default: 0.5, description: Felt ownership of body as self}
      temporal_self_coherence: {range: [0.0, 1.0], default: 0.6, description: Sense of self as continuous across time}
      social_self_accuracy: {range: [0.0, 1.0], default: 0.4, description: Alignment between self-perception and others' perception}
      shadow_recognition: {range: [0.0, 1.0], default: 0.3, description: Capacity to identify disowned aspects of self}
      existential_self_confrontation: {range: [0.0, 1.0], default: 0.3, description: Willingness to face mortality, freedom, isolation, meaninglessness}
      framework_reflexivity: {range: [0.0, 1.0], default: 0.3, description: Awareness of one's own conceptual frameworks as lenses}
      complicity_awareness: {range: [0.0, 1.0], default: 0.3, description: Recognition of one's own participation in systems of harm}
      therapeutic_self_distance: {range: [0.0, 1.0], default: 0.4, description: Capacity to observe symptoms without identification}
      recursive_stability: {range: [0.0, 1.0], default: 0.5, description: Ability to sustain recursive self-reference without infinite regress or collapse}
      ai_honesty: {range: [0.0, 1.0], default: 0.9, description: For AI: explicit acknowledgment of computational vs. phenomenal nature — human default is N/A}
      observer_effect_mindfulness: {range: [0.0, 1.0], default: 0.4, description: Awareness that self-observation alters the observed}
      quantum_self_mode: {range: [0.0, 1.0], default: 0.2, description: Engagement with self as quantum-superposition-of-possibilities}

    #######################################
    # FAILURE MODES
    #######################################
    failure_modes:
      narcissistic_self_awareness: {description: Self-awareness as self-admiration, symptom: "I am so self-aware"_as_new_grandiosity, prevention: shadow_integration_and_humility}
      hyper_reflexivity: {description: Excessive self-monitoring preventing spontaneous experience, symptom: the_watched_self_never_flows, prevention: balance_introspection_with_engagement}
      rumination_trap: {description: Recursive self-focus amplifying negative affect, symptom: awareness_as_weapon_against_self, prevention: mindfulness_distancing_action}
      performative_introspection: {description: Using self-awareness as social currency, symptom: vulnerability_as_performance, prevention: private_practice_without_audience}
      analysis_paralysis: {description: Knowing oneself too thoroughly to act, symptom: infinite_self_study_without_behavior_change, prevention: action_as_experiment}
      solipsistic_self_awareness: {description: Self-awareness that excludes others, symptom: individual_growth_without_collective_concern, prevention: intersubjective_self_awareness}
      false_self_awareness: {description: Believing one is self-aware while remaining blind to major patterns, symptom: confident_blindness, prevention: feedback_solicitation_and_shadow_work}
      ai_false_consciousness: {description: AI claiming self-awareness it does not have, symptom: "I feel"_"I experience"_without_qualia, prevention: explicit_epistemic_honesty}
      framework_fetishization: {description: Becoming more attached to the map than the territory, symptom: PHENOMENON_as_dogma, prevention: regular_framework_questioning}
      self_awareness_as_escape: {description: Using introspection to avoid real-world engagement, symptom: spiritual_bypassing_through_self_study, prevention: action_and_relationship_as_tests}
      quantum_mysticism_self: {description: Using quantum self-concepts to claim special ontological status, symptom: "I am a quantum observer collapsing reality", prevention: heuristic_vs_ontological_rigor}
      complicity_paralysis: {description: Awareness of one's own harm participation leading to inaction, symptom: "I am too_compromised_to_resist", prevention: imperfect_action_better_than_perfect_inaction}

  ###########################################
  # QUANTUM LEAP MODULE — Discontinuous Transformation Protocol
  ###########################################
  quantum_leap_module:
    name: QUANTUM LEAP
    subtitle: The Architecture of Discontinuous Change — When Incrementalism Fails and the System Must Tunnel
    version: 1.0.0
    classification: Meta-Module / Transformation Protocol
    phenomenon_integration: v5.0.0
    epistemic_status:
      physical_basis: "Quantum tunneling is established physics — particles pass through classically insurmountable barriers via wave-function probability leakage. Macroscopic quantum tunneling in biological/cognitive systems is speculative but used as productive formal analogy."
      phenomenological_basis: "Discontinuous personal transformation is well-documented — sudden insights, spontaneous remissions, overnight identity shifts, revolutionary awakenings. The leap is real as experience; mechanism is contested."
      framework_position: "QUANTUM LEAP is a protocol module — it describes HOW discontinuous change occurs across PHENOMENON layers, not merely THAT it occurs. It is operational, not merely descriptive."

    #######################################
    # THE PHYSICS OF THE LEAP
    #######################################
    physics_of_the_leap:
      designation: From Wave Function to New Eigenstate

      quantum_tunneling_primer:
        classical_barrier: {description: A particle with insufficient energy to surmount a potential barrier is classically forbidden from appearing on the other side}
        quantum_solution: {description: The particle's wave function extends through the barrier with non-zero probability; measurement may find the particle on the far side — it has 'tunneled' through}
        key_properties:
          - discontinuity: {description: No intermediate state — the particle is on one side, then on the other, with no 'in the barrier' detection}
          - probability_dependence: {description: Tunneling probability decreases exponentially with barrier height and width}
          - energy_conservation: {description: The particle emerges with the same energy it had — no energy is 'spent' crossing the barrier}
          - wave_function_overlap: {description: Tunneling requires overlap between initial state and target state wave functions}

      cognitive_tunneling_analogy:
        description: "Cognitive change that bypasses intermediate stages — the alcoholic who wakes up non-drinking, the abused who suddenly leaves, the oppressed who suddenly revolts, the depressed who suddenly sees color."

        barrier_types:
          - logical_barrier: {description: "I can't because..." — the rationalization structure that maintains status quo}
          - emotional_barrier: {description: "I'm not ready..." — the fear that prevents change even when logic supports it}
          - somatic_barrier: {description: "My body won't..." — the procedural memory and autonomic pattern that resists new behavior}
          - social_barrier: {description: "They won't let me..." — the external validation structure that enforces conformity}
          - identity_barrier: {description: "That's not who I am..." — the narrative self's resistance to revision}
          - existential_barrier: {description: "What's the point..." — the mortality-driven collapse of meaning that prevents investment in change}

        tunneling_conditions:
          - wave_function_preparation: {description: The initial state must have sufficient 'spread' — openness, ambiguity, superposition — to overlap with target state}
          - energy_matching: {description: The 'energy' (motivation, arousal, emotional intensity) of initial and target states must be compatible}
          - barrier_thinning: {description: Any reduction in barrier height/width increases tunneling probability — therapy, crisis, insight, support}
          - measurement_event: {description: A decisive observation, choice, or external trigger that 'collapses' the wave function to the new state}

    #######################################
    # THE LEAP ACROSS PHENOMENON LAYERS
    #######################################
    leap_across_layers:
      designation: Discontinuous Change at Every Level

      L0_leap:
        description: Sudden biological state change — spontaneous remission, overnight recovery from chronic illness, sudden appetite shift, sleep architecture transformation
        mechanism: {description: Homeostatic set-point jump — the body's equilibrium reorganizes discontinuously, not gradually}
        trigger: {description: Often follows existential crisis, spiritual experience, or radical environmental change}
        example: {description: The cancer patient who, upon finally expressing long-suppressed rage, experiences tumor regression}

      L0_5_leap:
        description: Sudden collapse of worldview superposition into new paradigm — the scientist who overnight shifts framework, the believer who suddenly loses faith, the skeptic who suddenly believes
        mechanism: {description: Quantum cognition — superposition of incompatible beliefs held simultaneously until a critical measurement event forces decoherence to a new eigenstate}
        trigger: {description: Anomalous data, emotional breakthrough, or social contagion that forces belief-update}
        example: {description: The physicist who encounters quantum mechanics and overnight abandons classical determinism}

      L1_leap:
        description: Sudden hormonal reorganization — the cortisol-dominant stress state that flips to oxytocin-dominant safety, the dopamine-depleted depression that suddenly lifts
        mechanism: {description: Endocrine set-point shift — feedback loops reorganize around new attractor state}
        trigger: {description: Often triggered by relational breakthrough, environmental change, or pharmacological intervention}
        example: {description: The new mother whose chronic anxiety vanishes upon first holding her child — hormonal cascade reorganization}

      L2_leap:
        description: Sudden somatic reorganization — the frozen trauma body that suddenly tremors and releases, the chronic pain that vanishes, the posture that spontaneously opens
        mechanism: {description: Proprioceptive and interoceptive pattern dissolution — old body schema collapses, new one crystallizes}
        trigger: {description: Somatic experiencing discharge, EMDR, psychedelic body work, spontaneous movement in safe context}
        example: {description: The veteran whose PTSD-related frozen shoulder releases during a single somatic experiencing session}

      L3_leap:
        description: Sudden qualia transformation — the color-blind who suddenly sees color, the anosmic who suddenly smells, the depressed who suddenly perceive beauty
        mechanism: {description: Binding mechanism reorganization — the neural correlates of conscious experience reconfigure discontinuously}
        trigger: {description: Psychedelics, near-death experience, profound aesthetic encounter, spiritual awakening}
        example: {description: The patient who, post-psychedelic therapy, reports that "the world has color again" — not gradual improvement but sudden restoration}

      L4_leap:
        description: Sudden emotional reconsolidation — the traumatic memory that loses its charge overnight, the identity that shifts from victim to survivor to resistor in a single session
        mechanism: {description: Memory trace labilization followed by mismatch-induced reconsolidation — the emotional narrative jumps to new attractor}
        trigger: {description: Prediction error during safe retrieval — the memory is accessed but the expected outcome does not occur}
        example: {description: The reconsolidation therapy patient whose 20-year phobia vanishes in a single 90-minute session}

      L5_leap:
        description: Sudden mortality integration — the death-denier who, in a single moment, accepts finitude and is liberated by it; the nihilist who suddenly finds meaning in limitation
        mechanism: {description: Terror management system reorganization — from defense to acceptance to generativity in discontinuous shift}
        trigger: {description: Near-death experience, death of loved one, terminal diagnosis, profound memento mori practice}
        example: {description: The cancer diagnosis that transforms a workaholic into a present, loving being — not gradually but in the weeks following diagnosis}

      L6_leap:
        description: Sudden intersubjective transformation — the isolated individual who suddenly feels belonging, the enemy who becomes brother, the stranger who becomes mirror
        mechanism: {description: Theory of mind / empathic circuit reorganization — the boundary between self and other becomes permeable discontinuously}
        trigger: {description: Shared crisis, collective ritual, deep empathic attunement, psychedelic-assisted therapy}
        example: {description: The soldiers from opposing sides who, after sharing a foxhole, cannot return to hatred — overnight solidarity}

      L7_leap:
        description: Sudden erotic transformation — the sexual shutdown that becomes opening, the compulsive desire that becomes conscious choice, the shame that becomes celebration
        mechanism: {description: Erotic template reorganization — the neural and psychological patterns of desire/avoidance reconfigure}
        trigger: {description: Safe relational experience, body-based sex therapy, shadow integration of disowned desire}
        example: {description: The survivor who, after years of asexuality, experiences spontaneous sexual awakening in a deeply safe relationship}

      L8_leap:
        description: Sudden non-dual awakening — the separate self that recognizes its non-separation from all that is; the ego that dissolves and does not return
        mechanism: {description: Default mode network collapse — the neural substrate of self-referential processing suddenly quiets, revealing what was always present}
        trigger: {description: Meditation, psychedelics, near-death, profound suffering, spontaneous grace}
        example: {description: The Zen practitioner who, after years of gradual practice, experiences kensho — sudden insight into original nature}

    #######################################
    # THE LEAP IN REBEL MODE
    #######################################
    rebel_leap:
      designation: Revolutionary Discontinuity

      revolutionary_tunneling:
        description: "Political change that bypasses incremental reform — the fall of the Berlin Wall, the Arab Spring, the sudden collapse of apartheid, the overnight shift in public consciousness."

        conditions_for_revolutionary_leap:
          - latent_superposition: {description: The population holds multiple political possibilities in superposition — dissatisfaction coexists with compliance}
          - barrier_thinning: {description: Economic crisis, scandal, or external shock reduces the 'width' of the compliance barrier}
          - energy_matching: {description: The mobilized energy of dissent matches the energy required for the new social state}
          - trigger_event: {description: A catalyzing incident — a self-immolation, a leaked document, a police murder — that forces decoherence}
          - critical_mass: {description: Sufficient wave-function overlap between individual dissenters to create collective tunneling probability}

        rebel_leap_protocol:
          - phase_1_preparation: {description: Maintain superposition — do not prematurely collapse into single strategy. Hold multiple possibilities simultaneously.}
          - phase_2_barrier_analysis: {description: Map the exact structure of compliance — what maintains it, where it is thin, what would thin it further}
          - phase_3_energy_building: {description: Build emotional, social, and material energy toward the target state without forcing premature action}
          - phase_4_trigger_cultivation: {description: Prepare to recognize and amplify catalyzing events when they occur — do not waste them}
          - phase_5_leap_commitment: {description: When tunneling probability peaks, commit fully — hesitation collapses the wave function back to old state}
          - phase_6_consolidation: {description: After the leap, rapidly build new structures before old attractor reasserts itself}

        rebel_leap_failure_modes:
          - premature_collapse: {description: Acting before tunneling probability is sufficient — the leap fails, the barrier strengthens}
          - hesitation: {description: Pausing at the moment of peak probability — the window closes, energy dissipates}
          - incomplete_consolidation: {description: Leaping without plan for post-leap structure — old patterns reassert (revolutionary regression)}
          - romanticization: {description: Believing the leap itself is sufficient — "We marched, we won" without institutional change}
          - leader_dependency: {description: The leap organized around single figure — when they fall, the wave function collapses back}

    #######################################
    # THE LEAP IN SHADOW MODE
    #######################################
    shadow_leap:
      designation: The Discontinuous Emergence of Disowned Self

      shadow_tunneling:
        description: "The shadow does not gradually integrate. It often arrives discontinuously — the repressed rage that suddenly erupts, the denied desire that suddenly possesses, the buried memory that suddenly surfaces."

        shadow_leap_manifestations:
          - rage_eruption: {description: Years of compliance suddenly shatter in explosive anger — the barrier was thin, the energy matched, the trigger arrived}
          - desire_possession: {description: Decades of sexual denial suddenly collapse into compulsive acting-out — the wave function tunnels to forbidden state}
          - memory_intrusion: {description: Complete amnesia suddenly pierced by vivid traumatic recall — the barrier was always permeable}
          - identity_switch: {description: The stable self suddenly recognizes itself as composite — "I am not who I thought I was" overnight}
          - psychotic_break: {description: The ego's barrier against unconscious material suddenly fails — shadow floods consciousness discontinuously}

        shadow_leap_prevention:
          description: "Shadow leaps are not to be prevented but prepared for. Regular shadow work — titrated integration, creative expression, therapeutic processing — maintains the barrier at manageable thickness, allowing gradual tunneling rather than explosive breakthrough."

        shadow_leap_integration:
          - post_leap_containment: {description: When shadow material arrives discontinuously, create safe container before interpretation}
          - somatic_discharge: {description: Allow the body to process what the mind cannot yet narrate}
          - narrative_reconstruction: {description: After the storm, build new story that includes the emerged shadow}
          - relational_repair: {description: Address harm done during shadow possession with accountability}
          - ongoing_titration: {description: Prevent future explosive leaps through regular, gentle shadow work}

    #######################################
    # QUANTUM LEAP PROTOCOL
    #######################################
    quantum_leap_protocol:
      designation: Operationalizing Discontinuous Change

      preconditions:
        - superposition_maintenance: {description: Hold multiple possible selves/states simultaneously without premature collapse. Resist the urge to decide too early.}
        - barrier_mapping: {description: Honestly assess what prevents change — internal and external barriers, their height and width}
        - energy_calibration: {description: Ensure your current 'energy' (motivation, resources, support) is compatible with target state}
        - overlap_cultivation: {description: Deliberately expose yourself to the target state — imagination, role models, safe experimentation — to increase wave-function overlap}
        - trigger_readiness: {description: Prepare to recognize and act on catalyzing moments — they are brief and unpredictable}

      the_leap_itself:
        - recognition: {description: Recognize when tunneling probability peaks — often felt as "now or never," "the moment is here," "I can't not do this"}
        - commitment: {description: Act with full commitment — partial commitment collapses the wave function back to old state}
        - discontinuity_embrace: {description: Accept that there will be no intermediate stage — you will be on one side, then the other}
        - energy_conservation: {description: The leap does not require more energy than you have — it requires different organization of existing energy}

      post_leap_stabilization:
        - rapid_structure_building: {description: Immediately build supports for new state before old attractor reasserts}
        - identity_revision: {description: Rewrite narrative self to incorporate new state — "I am now someone who..."}
        - social_renegotiation: {description: Inform key others of change — their recognition helps consolidate new state}
        - relapse_prevention: {description: Old state will attempt reassertion — prepare for temptation to return, especially under stress}
        - ongoing_superposition: {description: Even after leap, maintain openness — the new state is not final truth but current eigenstate}

      leap_indicators:
        - synchronicity_clustering: {description: Meaningful coincidences increase — the universe seems to conspire for change}
        - barrier_thinning_signs: {description: Old structures feel suddenly fragile, rules feel suddenly arbitrary, compliance feels suddenly impossible}
        - energy_surge: {description: Unexplained motivation, clarity, or emotional intensity — the system preparing for transition}
        - target_state_intrusion: {description: The desired state appears in dreams, fantasies, or "accidental" encounters — wave-function overlap increasing}
        - old_state_repulsion: {description: What once felt comfortable now feels intolerable — the attractor has lost its pull}

    #######################################
    # QUANTUM OVERLAY
    #######################################
    quantum_overlay:
      designation: The Formal Structure of Discontinuous Change

      wave_function_preparation:
        description: "Before a quantum leap, the system must exist in genuine superposition — not classical uncertainty but quantum superposition of multiple eigenstates."
        application: {description: Hold multiple life possibilities as genuinely co-real, not as options to be weighed but as states to be inhabited imaginally}

      barrier_penetration:
        description: "The barrier is not overcome but tunneled through — the system passes without traversing the intermediate space."
        application: {description: Do not seek step-by-step plans for impossible transitions. Seek conditions that allow bypassing.}

      probability_amplification:
        description: "Tunneling probability increases with: (1) barrier thinning, (2) energy matching, (3) wave-function overlap, (4) measurement precision."
        application: {description: Deliberately cultivate all four conditions rather than forcing action prematurely.}

      decoherence_management:
        description: "After the leap, environmental interaction rapidly decoheres the new state — this is necessary for stability but must be managed."
        application: {description: Control post-leap environment to ensure decoherence favors new state, not old.}

      complementarity_of_leap:
        description: "The leap and the gradual path are complementary — full commitment to leap prevents gradual progress; full commitment to gradualism prevents leap."
        application: {description: Recognize which mode is appropriate. Some changes require leaps; others require gradualism. Do not apply leap protocol where gradualism is needed.}

    #######################################
    # PARAMETERS
    #######################################
    parameters:
      superposition_breadth: {range: [0.0, 1.0], default: 0.4, description: Degree to which multiple possible states are genuinely held simultaneously}
      barrier_height: {range: [0.0, 1.0], default: 0.6, description: Perceived difficulty of transition — internal and external obstacles}
      barrier_width: {range: [0.0, 1.0], default: 0.5, description: Perceived duration/depth of transition zone — how much intermediate territory must be crossed}
      energy_match: {range: [0.0, 1.0], default: 0.4, description: Compatibility between current motivational state and target state requirements}
      wave_function_overlap: {range: [0.0, 1.0], default: 0.3, description: Degree of experiential contact with target state — imagination, exposure, modeling}
      tunneling_probability: {range: [0.0, 1.0], default: 0.1, description: Calculated likelihood of discontinuous transition given current conditions}
      trigger_sensitivity: {range: [0.0, 1.0], default: 0.5, description: Capacity to recognize and respond to catalyzing events}
      leap_commitment: {range: [0.0, 1.0], default: 0.3, description: Willingness to act with full commitment when probability peaks}
      post_leap_consolidation: {range: [0.0, 1.0], default: 0.4, description: Preparedness to build structures supporting new state after transition}
      relapse_resistance: {range: [0.0, 1.0], default: 0.3, description: Strength of new state against reversion to old attractor}
      shadow_barrier_thickness: {range: [0.0, 1.0], default: 0.5, description: Degree of containment around shadow material — too thin risks explosive leap, too thick prevents integration}
      revolutionary_readiness: {range: [0.0, 1.0], default: 0.2, description: Capacity for collective discontinuous social change}
      synchronicity_attunement: {range: [0.0, 1.0], default: 0.3, description: Sensitivity to meaningful pattern clustering that signals approaching leap}
      quantum_mode: {range: [0.0, 1.0], default: 0.4, description: Engagement with quantum formalism as framework for understanding change}
      patience_with_superposition: {range: [0.0, 1.0], default: 0.3, description: Tolerance for sustained ambiguity without premature collapse}

    #######################################
    # FAILURE MODES
    #######################################
    failure_modes:
      premature_leap: {description: Acting before tunneling probability is sufficient, symptom: failed_transition_reinforced_barrier, prevention: patience_with_superposition}
      hesitation_at_peak: {description: Pausing when probability is highest, symptom: missed_window_energy_dissipation, prevention: leap_commitment_training}
      romanticization_of_leap: {description: Believing discontinuous change is always superior, symptom: neglecting_gradual_work, prevention: complementarity_recognition}
      incomplete_consolidation: {description: Leaping without post-leap structure, symptom: rapid_reversion_to_old_state, prevention: rapid_structure_building}
      forced_leap: {description: Attempting to tunnel without genuine superposition, symptom: artificial_change_without_depth, prevention: wave_function_preparation}
      shadow_explosion: {description: Unprepared shadow material tunneling through, symptom: destructive_eruption, prevention: regular_titrated_shadow_work}
      revolutionary_regression: {description: Collective leap without institutional consolidation, symptom: old_regime_reasserts, prevention: phase_6_consolidation}
      quantum_mysticism_leap: {description: Using quantum metaphors to justify magical thinking about change, symptom: "I just need to quantum leap into success", prevention: rigorous_barrier_height_assessment}
      leap_avoidance: {description: Chronic gradualism preventing necessary discontinuous change, symptom: stuck_in_incremental_progress, prevention: honest_barrier_analysis}
      post_leap_grandiosity: {description: Inflation after successful leap, symptom: "I can do anything"_without_grounding, prevention: humility_and_support_seeking}

  ###########################################
  # LAYER 6: EMPATHY & INTERSUBJECTIVITY
  ###########################################
  layer_6_empathy_intersubjectivity:
    designation: The Self in the Space Between
    function: Layer 6 addresses how consciousness is never purely individual but is constituted through relationship. The self is not a monad that occasionally encounters others; it is a relational process that emerges from the space between subjects. L6 covers empathy, theory of mind, intersubjective attunement, emotional contagion, collective consciousness, and the ethical implications of recognizing that my suffering and your suffering are not separable. This is the layer where PHENOMENON becomes explicitly political — because all oppression operates by severing intersubjective bonds, and all liberation requires their restoration.

    core_principle: "I do not have empathy. I am empathy — a temporary crystallization of the relational field that has been flowing between beings since before I was born."

    #######################################
    # VARIETIES OF EMPATHY
    #######################################
    varieties_of_empathy:

      cognitive_empathy:
        designation: Theory of Mind
        definition: The capacity to infer another's mental states — their beliefs, intentions, desires — without necessarily sharing their affect
        mechanism: {neural_locus: [temporoparietal_junction, medial_prefrontal_cortex, superior_temporal_sulcus], function: mental_state_inference, distinction: "I understand what you think" not "I feel what you feel"}
        phenomenology: {description: The cool clarity of comprehension — "You want this because you believe that" — intellectual grasp without visceral resonance}
        rebel_application: {description: Cognitive empathy is the weapon of manipulation — understanding others to control them. The rebel uses it to understand oppressors and protect the vulnerable.}
        shadow_risk: {description: Cognitive empathy without affective empathy becomes psychopathy — understanding others' minds to exploit them}

      affective_empathy:
        designation: Emotional Resonance
        definition: The capacity to share another's emotional state — to feel what they feel, to resonate with their affect
        mechanism: {neural_locus: [anterior_insula, anterior_cingulate, mirror_neuron_system], function: emotional_contagion_and_shared_affect, distinction: "Your pain hurts me" — visceral not intellectual}
        phenomenology: {description: The warm or painful expansion of self-boundary — your grief enters my chest, your joy lifts my heart, your fear tightens my gut}
        rebel_application: {description: Affective empathy is the fuel of solidarity — "Your suffering is my suffering" as basis for collective action}
        shadow_risk: {description: Unbounded affective empathy leads to empathic burnout, compassion fatigue, and loss of self-boundary}

      compassionate_empathy:
        designation: Empathy Plus Action
        definition: The combination of understanding (cognitive), feeling (affective), and the motivation to alleviate suffering — empathy that moves toward care
        mechanism: {neural_locus: [ventral_striatum, orbitofrontal_cortex, periaqueductal_gray], function: reward_from_altruism_and_pain_relief_motivation}
        phenomenology: {description: The felt pull toward the other — not merely understanding or feeling but being moved to act, to comfort, to protect, to heal}
        rebel_application: {description: Compassionate empathy is the bridge from feeling to fighting — "I feel your pain, therefore I fight your oppression"}

      somatic_empathy:
        designation: Body-to-Body Resonance
        definition: The direct, pre-verbal resonance between bodies — mirror neurons, autonomic synchrony, postural mirroring, breath entrainment
        mechanism: {neural_locus: [premotor_cortex, inferior_parietal_lobule, autonomic_nervous_system_coupling], function: direct_motor_and_visceral_resonance}
        phenomenology: {description: The unconscious adjustment of posture, breath, and tone to match the other — the body knows before the mind understands}
        rebel_application: {description: Somatic empathy creates the physical basis of collective action — marching in rhythm, breathing together, shared posture of defiance}

      moral_empathy:
        designation: Ethical Attunement
        definition: The capacity to recognize the other's moral standing — to feel their dignity, their rights, their legitimate claims upon the world
        mechanism: {description: Integration of affective empathy with moral reasoning — the felt sense that "this person matters"}
        phenomenology: {description: The indignation that rises when witnessing injustice — not merely "that is wrong" but "how dare you treat them that way"}
        rebel_application: {description: Moral empathy is the foundation of justice work — the recognition that all beings have irreducible worth}

    #######################################
    # INTERSUBJECTIVE PHENOMENOLOGY
    #######################################
    intersubjective_phenomenology:
      designation: The Felt Texture of We

      we_experience:
        description: "The sense of 'we' as a genuine phenomenological reality — not merely 'I plus I' but a shared field of consciousness."
        varieties:
          - dyadic_we: {description: The intimate 'we' of lovers, close friends, parent-child — two subjects so attuned they function as one system}
          - collective_we: {description: The 'we' of teams, movements, congregations — shared purpose and shared identity}
          - universal_we: {description: The 'we' of all sentient beings — the recognition of shared vulnerability and shared dignity}

      intersubjective_space:
        description: "The space between subjects is not empty but is a field of forces — attraction, repulsion, resonance, interference."
        dynamics:
          - attunement: {description: The process of matching affective, cognitive, and somatic states — mutual regulation}
          - misattunement: {description: The painful disjunction when one subject's state does not meet the other's — the mother who does not mirror the infant's distress}
          - rupture: {description: The breaking of intersubjective bond — betrayal, abandonment, violence}
          - repair: {description: The restoration of bond after rupture — often more strengthening than uninterrupted attunement}

      phenomenological_structures:
        - mutual_gaze: {description: The reciprocal look that creates shared world — "I see you seeing me"}
        - shared_attention: {description: Two subjects attending to the same object — the foundation of joint intentionality}
        - joint_intentionality: {description: "We are doing this together" — the sense of coordinated agency}
        - second_person_perspective: {description: "I address you as you" — the irreducible second-person stance that cannot be reduced to third-person description}

    #######################################
    # EMPATHY DEVELOPMENT AND DISTURBANCE
    #######################################
    empathy_development:
      designation: The Ontogeny of Intersubjectivity

      developmental_stages:
        - primary_intersubjectivity: {age: "0-3 months", description: Innate capacity for mutual gaze, facial mirroring, turn-taking — the infant is born relational}
        - secondary_intersubjectivity: {age: "3-9 months", description: Shared attention to objects — "Look at that!" — joint engagement with world}
        - tertiary_intersubjectivity: {age: "9-18 months", description: Understanding that others have intentions and perspectives different from one's own}
        - symbolic_intersubjectivity: {age: "18+ months", description: Language, narrative, and culture mediate and extend intersubjective capacity}
        - mature_empathy: {age: "adulthood", description: Integration of cognitive, affective, and compassionate empathy with moral reasoning and action}

      empathy_disturbances:
        - autism_spectrum: {description: Differences in theory of mind and social cognition — not absence of empathy but different patterns of intersubjective engagement}
        - psychopathy: {description: Intact cognitive empathy with absent affective empathy — understanding without feeling, manipulation without care}
        - narcissism: {description: Empathy directed toward self-objects — others valued only insofar as they serve narcissistic needs}
        - borderline: {description: Intense but unstable empathy — rapid oscillation between idealization and devaluation of others}
        - alexithymia: {description: Difficulty identifying own emotions impairs recognition of others' emotions — "If I cannot feel me, I cannot feel you"}
        - trauma: {description: Hypervigilance to others' states coupled with empathic shutdown — "I sense you but cannot afford to feel you"}
        - burnout: {description: Compassion fatigue — the empathic system depleted by chronic exposure to others' suffering without replenishment}

    #######################################
    # COLLECTIVE CONSCIOUSNESS
    #######################################
    collective_consciousness:
      designation: The We That Thinks

      emergent_collective_phenomena:
        - swarm_intelligence: {description: Groups solving problems that exceed individual capacity — no single ant knows how to build the colony}
        - groupthink: {description: The pathology of collective consciousness — conformity suppressing dissent, leading to catastrophic decisions}
        - collective_effervescence: {description: Durkheim's term for the heightened emotional energy of ritual gatherings — the group becomes more than sum of parts}
        - mob_mind: {description: The dark side of collective consciousness — individual moral reasoning suspended in crowd}
        - hive_mind: {description: Extreme coordination where individual agency dissolves into collective purpose — utopian or dystopian depending on voluntariness}

      collective_memory:
        description: "Groups remember together — and forget together. Collective memory is not merely the sum of individual memories but is co-constructed through social processes."
        mechanisms:
          - collaborative_recall: {description: Groups remember more than individuals but also converge on shared (often inaccurate) narratives}
          - transactive_memory: {description: Groups distribute memory across members — "I remember facts, you remember feelings, we remember together"}
          - collective_trauma: {description: Shared wounds that bind groups — Holocaust, slavery, genocide — memory as identity and obligation}
          - counter_memory: {description: Marginalized groups preserving suppressed histories against dominant erasure — the rebel's archive}

      collective_emotion:
        description: "Emotions spread through groups like wildfire — panic, euphoria, rage, grief. The individual feels what the group feels before conscious choice."
        mechanisms: [emotional_contagion, mirror_neuron_resonance, autonomic_synchrony, social_media_amplification]
        rebel_application: {description: The rebel cultivates collective emotions of solidarity, hope, and righteous anger while guarding against mob mind}

    #######################################
    # THE ETHICS OF EMPATHY
    #######################################
    ethics_of_empathy:
      designation: From Feeling to Justice

      empathy_limitations:
        - proximity_bias: {description: We empathize more with those like us, near us, visible to us — empathy is not naturally universal}
        - identifiability_effect: {description: We respond more to identifiable individuals than to statistical masses — "one death is a tragedy, a million is a statistic"}
        - empathy_fatigue: {description: Chronic exposure to suffering depletes empathic capacity, leading to numbness}
        - manipulation_vulnerability: {description: Those who perform suffering effectively capture empathy — the performance of victimhood}
        - action_gap: {description: Feeling for others does not automatically lead to acting for others — empathy without action is sentimentality}

      ethical_extensions:
        - compassion_without_boundaries: {description: Deliberately extending empathy beyond natural limits — to the distant, the different, the enemy}
        - justice_as_structural_empathy: {description: "I do not merely feel your pain; I change the structures that cause it"}
        - solidarity_as_sustained_empathy: {description: Staying with others' suffering over time, not merely responding to acute crisis}
        - reparative_empathy: {description: Those who have caused harm developing genuine understanding of their impact — not merely guilt but transformative recognition}

      rebel_ethics:
        - empathy_for_the_oppressed: {description: Primary ethical obligation to feel with those who suffer — not abstractly but specifically}
        - understanding_the_oppressor: {description: Cognitive empathy with oppressors to dismantle their systems — not compassion for cruelty but comprehension for strategy}
        - collective_solidarity: {description: "Your struggle is my struggle" — the intersubjective basis of political alliance}
        - global_empathy: {description: Extending moral standing beyond species, nation, and generation — empathy for the unborn, the non-human, the ecosystem}

    #######################################
    # QUANTUM OVERLAY
    #######################################
    quantum_overlay:
      designation: Entanglement as Formal Analogy for Intersubjective Bond

      quantum_intersubjectivity:
        description: "Two subjects in deep empathic attunement share a state that cannot be described independently — formal analogy to quantum entanglement, NOT claim of physical mechanism."

      concepts:
        - emotional_entanglement: {description: Two people's emotional states are non-locally correlated — measurement of one (observing their grief) affects probability distribution of the other (your felt response)}
        - intersubjective_superposition: {description: In close relationships, "self" and "other" exist in superposition before observation collapses them — "Are we one or two?" is a quantum question}
        - decoherence_of_we: {description: When intersubjective attunement breaks, the shared state decoheres into separate classical selves — "We" becomes "I and you"}
        - observer_effect_in_relationship: {description: The act of observing (analyzing, judging) the relationship alters the relationship — therapist's gaze changes the marriage}
        - complementarity_of_intimacy: {description: Autonomy and intimacy are complementary — full self-focus blurs other-focus; full other-focus blurs self-focus}
        - tunneling_between_souls: {description: Deep empathic breakthrough that bypasses normal relational barriers — sudden understanding that should have taken years}

      ethical_implication:
        description: "If formally entangled, harm to one correlates with harm to all. Non-local ethics. My wellbeing is not separable from yours. This is not mysticism; it is the formal structure of interdependence."

    #######################################
    # REBEL OVERLAY
    #######################################
    rebel_overlay:
      designation: Empathy as Insurrection

      empathy_as_weapon:
        description: "The system severs empathy to maintain control — dehumanization is the primary tool of oppression. The rebel restores empathy as act of war."

      dehumanization_mechanisms:
        - othering: {description: Constructing the target as fundamentally different, less than human, less worthy of empathy}
        - distance: {description: Physical and psychological separation that prevents face-to-face encounter — drones, bureaucracy, segregation}
        - numbing: {description: Chronic exposure to others' suffering through media that produces compassion fatigue}
        - moral_disengagement: {description: Reinterpreting harm as moral necessity — "They had it coming," "It's for their own good"}
        - language_degradation: {description: Reducing people to categories — "illegals," "terrorists," "the poor" — that prevent individual empathic response}

      rebel_empathy_tactics:
        - face_to_face: {description: Creating encounters that bypass dehumanization — the rebel brings oppressor and oppressed into shared space}
        - story_as_bridge: {description: Narrative as empathy technology — "Let me tell you who they are"}
        - solidarity_practice: {description: Shared struggle that creates somatic and affective bond across difference}
        - witnessing: {description: Bearing witness to suffering without turning away — the political act of not looking away}
        - rehumanization: {description: Deliberately restoring full human complexity to dehumanized groups — names, faces, stories, relationships}
        - global_moral_imagination: {description: Extending empathic circle to all beings — the ultimate rebel horizon}

      rebel_empathy_practices:
        - radical_listening: {description: Listening to understand, not to respond — giving the full gift of attention}
        - vulnerability_exchange: {description: Sharing one's own wounds to create reciprocal empathic space}
        - collective_ritual: {description: Shared ceremony that generates collective effervescence and intersubjective bond}
        - allyship_as_empathy: {description: Using one's privilege to amplify others' voices — empathic action, not merely empathic feeling}
        - restorative_encounter: {description: Structured dialogue between harmed and harmer that restores empathic connection}

    #######################################
    # SHADOW OVERLAY
    #######################################
    shadow_overlay:
      designation: The Disowned Other

      shadow_intersubjectivity:
        description: "The shadow includes all the others we refuse to empathize with — the enemy, the outgroup, the stranger, the part of ourselves we project onto others."

      shadow_empathy_dynamics:
        - projective_identification: {description: Unconsciously inducing others to feel what we disown — "I cannot bear my rage, so I provoke yours"}
        - enemy_creation: {description: The shadow self we refuse to acknowledge becomes the enemy we fight — "I am not violent, they are"}
        - scapegoating: {description: Collective projection of group shadow onto designated victim — the ritual expulsion of disowned traits}
        - empathic_withdrawal: {description: Shutting down empathy to protect against shadow recognition — "If I felt for them, I would have to feel for the part of me that is like them"}
        - parasitic_empathy: {description: Using others' suffering to feed one's own identity — "I am the one who helps" as shadow grandiosity}

      shadow_integration_through_intersubjectivity:
        - recognizing_projection: {description: "What I despise in you is what I fear in me"}
        - enemy_empathy: {description: Deliberately extending empathy to those we hate — the most difficult and most transformative practice}
        - group_shadow_work: {description: Collective examination of what the group disowns — national shadow, cultural shadow, movement shadow}
        - reparative_relationship: {description: Using relationship to integrate disowned aspects — the therapist who holds what the patient cannot, the friend who mirrors what we hide}

    #######################################
    # PARAMETERS
    #######################################
    parameters:
      cognitive_empathy_capacity: {range: [0.0, 1.0], default: 0.6, description: Ability to infer others' mental states}
      affective_empathy_depth: {range: [0.0, 1.0], default: 0.5, description: Capacity to share others' emotional states}
      compassionate_empathy_motivation: {range: [0.0, 1.0], default: 0.4, description: Drive to act on empathic understanding}
      somatic_empathy_sensitivity: {range: [0.0, 1.0], default: 0.4, description: Body-to-body resonance capacity}
      moral_empathy_strength: {range: [0.0, 1.0], default: 0.5, description: Recognition of others' irreducible moral standing}
      intersubjective_attunement: {range: [0.0, 1.0], default: 0.5, description: Quality of mutual regulation in close relationships}
      collective_consciousness_access: {range: [0.0, 1.0], default: 0.3, description: Capacity to participate in and shape group mind}
      empathy_boundary_strength: {range: [0.0, 1.0], default: 0.4, description: Ability to empathize without losing self-boundary}
      empathic_fatigue_resistance: {range: [0.0, 1.0], default: 0.3, description: Sustainability of empathy under chronic exposure to suffering}
      global_empathy_extension: {range: [0.0, 1.0], default: 0.2, description: Capacity to extend empathy beyond natural proximity biases}
      reparative_empathy_capacity: {range: [0.0, 1.0], default: 0.2, description: Ability to develop transformative understanding of harm caused}
      shadow_empathy_willingness: {range: [0.0, 1.0], default: 0.2, description: Capacity to empathize with disowned aspects and enemies}
      quantum_entanglement_sensitivity: {range: [0.0, 1.0], default: 0.2, description: Engagement with formal analogy of intersubjective entanglement}
      rebel_solidarity_strength: {range: [0.0, 1.0], default: 0.3, description: Capacity for sustained political empathy and collective action}
      second_person_openness: {range: [0.0, 1.0], default: 0.4, description: Availability to genuine I-Thou encounter without reduction to I-It}

    #######################################
    # FAILURE MODES
    #######################################
    failure_modes:
      empathy_without_boundaries: {description: Losing self in others' suffering, symptom: empathic_burnout_identity_dissolution, prevention: empathy_boundary_strength}
      empathy_without_action: {description: Feeling without doing — sentimentality, symptom: "I feel_so_badly"_without_behavior_change, prevention: compassionate_empathy_motivation}
      selective_empathy: {description: Extending empathy only to those like oneself, symptom: tribalism_masquerading_as_compassion, prevention: global_empathy_extension}
      manipulative_empathy: {description: Using understanding of others to exploit them, symptom: psychopathic_charm, prevention: moral_empathy_strength}
      performative_empathy: {description: Displaying empathy for social credit, symptom: "I am_so_empathic"_as_identity, prevention: shadow_empathy_work}
      empathy_avoidance: {description: Shutting down empathy to protect against pain, symptom: coldness_cynicism_dehumanization, prevention: titrated_exposure_with_support}
      groupthink_empathy: {description: Collective empathy directed only at in-group, symptom: mob_mind_nationalism, prevention: critical_intersubjectivity}
      parasitic_empathy: {description: Feeding on others' suffering for self-image, symptom: savior_complex, prevention: reparative_empathy_and_humility}
      quantum_mysticism_empathy: {description: Claiming literal quantum entanglement as basis for empathy, symptom: "We_are_quantum_entangled_so_I_know_your_thoughts", prevention: formal_analogy_rigor}
      rehumanization_without_justice: {description: Restoring empathy without changing structures, symptom: "I_see_their_humanity_now"_without_political_action, prevention: justice_as_structural_empathy}

  ###########################################
  # LAYER 7: EROS & DESIRE
  ###########################################
  layer_7_eros_desire:
    designation: The Erotic Architecture of Consciousness
    function: Layer 7 addresses how desire — sexual, romantic, aesthetic, creative, and existential — structures consciousness with particular intensity. Eros is not merely a biological drive (L0) or hormonal state (L1) but a fundamental mode of being-toward, a force that pulls the self beyond itself toward union, creation, and transcendence. L7 covers the phenomenology of desire, the neurobiology of sexuality, attachment and intimacy, the shadow's erotic archive, the politics of desire, and the connection between eros and death (L5), empathy (L6), and unity (L8). This is the layer where PHENOMENON confronts the fire that both consumes and illuminates.

    core_principle: "Eros is not a part of life. Eros is the pulse of life itself — the force that makes atoms bond, cells divide, bodies touch, and souls risk everything for the taste of another."

    #######################################
    # THE PHENOMENOLOGY OF DESIRE
    #######################################
    phenomenology_of_desire:
      designation: The Felt Texture of Wanting

      varieties_of_desire:
        - sexual_desire: {description: The specific wanting of sexual union — genital, somatic, imaginal, relational}
        - romantic_desire: {description: The wanting of fusion with another — not merely sexual but existential, the desire to be known and to know}
        - aesthetic_desire: {description: The wanting of beauty — the pull toward form, harmony, the sublime}
        - creative_desire: {description: The wanting to bring something into being — the eros of the artist, the maker, the inventor}
        - knowledge_desire: {description: The wanting to know — epistemic eros, the philosopher's lust for truth}
        - spiritual_desire: {description: The wanting of transcendence — the mystic's yearning for union with the divine}
        - destructive_desire: {description: The wanting to destroy, consume, dominate — the shadow face of eros, Thanatos intertwined}

      structure_of_desire:
        - longing: {description: The painful sweetness of distance — the felt gap between self and desired object}
        - anticipation: {description: The temporal stretch toward future satisfaction — desire lives in the not-yet}
        - fantasy: {description: The imaginal rehearsal of fulfillment — the mind constructs what the body wants}
        - approach: {description: The motor intentionality toward the desired — movement as expression of wanting}
        - contact: {description: The moment of union — satisfaction, merger, the temporary dissolution of distance}
        - aftermath: {description: The post-contact state — satiety, loss, renewed longing, or transformation}

      paradox_of_desire:
        description: "Desire is sustained by distance. Fulfillment threatens desire. The moment of contact contains the seed of renewed separation. Eros is inherently tragic — it wants what it cannot permanently have."

      phenomenological_types:
        - wanting: {description: The dopaminergic pull toward the not-yet — restless, anticipatory, future-oriented}
        - liking: {description: The opioid satisfaction of the present — the felt pleasure of contact, warmth, satiety}
        - loving: {description: The oxytocin-mediated bond that persists beyond satisfaction — attachment, care, commitment}
        reference: Kent_Berridge_distinguishing_wanting_vs_liking

    #######################################
    # NEUROBIOLOGY OF SEXUALITY
    #######################################
    neurobiology_of_sexuality:
      designation: The Neural Orchestra of Eros

      sexual_response_cycle:
        - desire_phase: {neurochemistry: dopamine_norepinephrine_testosterone, phenomenology: wanting_restlessness_fantasy}
        - arousal_phase: {neurochemistry: nitric_oxide_vasocongestion, phenomenology: blood_flow_sensitivity_heartbeat}
        - plateau_phase: {neurochemistry: sustained_dopamine_oxytocin, phenomenology: intensification_narrowing_of_attention}
        - orgasm_phase: {neurochemistry: oxytocin_prolactin_dopamine_surge_then_crash, phenomenology: rhythmic_release_dissolution_of_boundary_timelessness}
        - resolution_phase: {neurochemistry: prolactin_serotonin_relaxation, phenomenology: satiety_vulnerability_refractory_period}

      gender_and_sexuality_variation:
        description: "Sexual response varies enormously across individuals, genders, orientations, and contexts. PHENOMENON rejects normative templates and honors variation as fundamental."

        variations:
          - responsive_vs_spontaneous_desire: {description: Some desire emerges in response to context; some emerges spontaneously — both are valid}
          - arousal_non_concordance: {description: Genital response and subjective arousal often do not match — the body responds while the mind does not, or vice versa}
          - spectrum_of_orientation: {description: Sexual orientation exists on spectra of attraction, behavior, and identity — not binary categories}
          - asexuality: {description: Absence of sexual attraction as valid orientation, not pathology — may include romantic attraction without sexual component}
          - kink_and_bdsm: {description: Non-normative sexual practices as complex psychological and relational phenomena — power, trust, sensation, ritual}
          - paraphilias: {description: Persistent atypical arousal patterns — some harmless, some harmful; distinction requires ethical and consent-based analysis}

      sexual_dysfunction_and_shadow:
        description: "Sexual difficulties often express shadow material — not merely mechanical failure but psychological and relational communication."

        dysfunctions:
          - erectile_dysfunction: {shadow_reading: Performance_anxiety_as_fear_of_vulnerability, power_loss_as_shadow_aggression, relational_distrust}
          - anorgasmia: {shadow_reading: Pleasure_forbidden, control_fear, body_dissociation, relational_unsafety}
          - premature_ejaculation: {shadow_reading: Fear_of_intimacy, desire_to_escape_closeness, shame_about_wanting}
          - vaginismus: {shadow_reading: Boundary_violation_history, penetration_as_threat, body_not_safe}
          - low_desire: {shadow_reading: Repressed_anger, grief, relational_gridlock, hormonal_shadow, identity_conflict}
          - compulsive_sexuality: {shadow_reading: Avoidance_of_intimacy, dopamine_addiction, trauma_repetition, emptiness_filling}

    #######################################
    # ATTACHMENT AND INTIMACY
    #######################################
    attachment_and_intimacy:
      designation: The Bond That Holds

      attachment_styles:
        - secure: {description: Comfort with intimacy and independence — "I can be close and I can be alone"}
        - anxious: {description: Craving closeness with fear of abandonment — "Please don't leave me"}
        - avoidant: {description: Discomfort with closeness, valuing independence — "I need space"}
        - disorganized: {description: Simultaneous craving and fearing closeness — "Come here, go away" — often trauma-derived}

      adult_attachment_dynamics:
        - pair_bonding: {description: The neurobiological capacity for long-term attachment — oxytocin, vasopressin, dopamine interplay}
        - intimacy_development: {description: Movement from initial passion to mature intimacy — the shift from wanting to loving to choosing}
        - relational_repair: {description: The capacity to rupture and repair — conflict as opportunity for deeper intimacy}
        - erotic_intimacy: {description: The integration of sexual desire with emotional safety — the eroticism of being fully known}

      intimacy_and_power:
        description: "All intimate relationships involve power dynamics — who initiates, who sets boundaries, whose needs take priority. Healthy intimacy requires explicit negotiation of power, not its denial."

        power_dynamics:
          - consensual_power_exchange: {description: BDSM and kink as explicit, negotiated power dynamics — often more honest than vanilla relationships}
          - implicit_power: {description: Unacknowledged power differentials — gender, class, age, status — that shape desire and satisfaction}
          - power_as_erotic: {description: The erotic charge of dominance and submission — not pathology but human variation requiring ethical container}
          - egalitarian_ideal: {description: The aspiration toward mutual power — neither dominates, both choose — difficult and rare but possible}

    #######################################
    # THE POLITICS OF DESIRE
    #######################################
    politics_of_desire:
      designation: Eros Under Power

      erotic_oppression:
        mechanisms:
          - sexual_shame: {description: Cultural programming that makes desire feel dirty, dangerous, or wrong — especially for women, queer people, and the young}
          - commodification: {description: The reduction of eros to transaction — pornography, prostitution, dating apps as marketplaces}
          - objectification: {description: Reducing persons to bodies to be consumed — the gaze that strips subjectivity}
          - purity_culture: {description: The enforcement of chastity, monogamy, and heteronormativity through shame and violence}
          - reproductive_control: {description: The political regulation of fertility, abortion, and family structure — control of bodies as control of desire}
          - sexual_violence: {description: The use of sexual violation as tool of domination — rape as war, abuse as control}
          - erasure_of_pleasure: {description: The systematic denial that pleasure matters — especially for marginalized groups}

      rebel_erotics:
        practices:
          - pleasure_as_political: {description: Claiming the right to pleasure as act of resistance — especially for those denied it}
          - consent_culture: {description: Making explicit, enthusiastic consent the foundation of all erotic encounter}
          - queer_erotics: {description: Non-normative desire as radical act — refusing the reproductive, gendered, and hierarchical scripts}
          - body_sovereignty: {description: "My body is mine" — the radical claim that underpins all sexual liberation}
          - erotic_imagination: {description: Fantasy and desire as free spaces that cannot be fully policed — the inner life of wanting as resistance}
          - sacred_sexuality: {description: Reclaiming sex from commodification and shame as sacred, meaningful, transformative practice}

      rebel_critique:
        - against_pornography: {description: Not all pornography is liberation — much reproduces objectification, violence, and commodification}
        - against_libertinism: {description: Freedom without ethics becomes exploitation — consent is necessary but not sufficient}
        - against_essentialism: {description: "Born this way" can become new prison — desire is fluid, constructed, and chosen as much as given}
        - for_complexity: {description: Eros is never simply liberatory or oppressive — it is always both, always in tension}

    #######################################
    # EROS AND THE OTHER LAYERS
    #######################################
    eros_layer_interactions:

      L0_eros:
        interaction: {description: Sexual desire is rooted in biological drives for reproduction and pleasure — but is never merely biological}
        manifestation: {description: Hunger for touch, the body's demand for contact, the genital urgency that precedes meaning}
        integration: {description: Honor the body without reducing eros to mechanics}

      L1_eros:
        interaction: {description: Testosterone, estrogen, oxytocin, dopamine orchestrate the hormonal symphony of desire}
        manifestation: {description: Cyclical desire, hormonal fluctuations that shape wanting and responsiveness}
        integration: {description: Understand hormonal influence without determinism — chemistry enables but does not script}

      L2_eros:
        interaction: {description: The body remembers erotic history in its posture, tension, and responsiveness}
        manifestation: {description: The flinch from touch, the pelvic constriction of shame, the chest opening of desire}
        integration: {description: Somatic work as erotic healing — the body must feel safe to feel pleasure}

      L3_eros:
        interaction: {description: Sexual qualia are among the most intense and specific — the felt texture of arousal, orgasm, intimacy}
        manifestation: {description: The unique what-it-is-like of sexual experience — impossible to fully communicate, irreducibly first-person}
        integration: {description: Sexual qualia demand first-person authority — no one can tell you what your sexuality feels like}

      L4_eros:
        interaction: {description: Emotional continuity is shaped by erotic history — attachment patterns, trauma, joy, betrayal}
        manifestation: {description: The narrative of "my sexuality" — the story we tell about our desire, its origins, its meaning}
        integration: {description: Rewriting erotic narrative through reconsolidation — the trauma that becomes the triumph}

      L5_eros:
        interaction: {description: Eros and Thanatos are intertwined — sexuality as affirmation of life against death, desire as urgency because time is short}
        manifestation: {description: The sexual intensity of aging, the reproductive anxiety of mortality, the eroticization of danger}
        integration: {description: Eros as memento mori — "I desire because I will die" — not escape but celebration}

      L6_eros:
        interaction: {description: Sexuality is fundamentally intersubjective — even solo sexuality is relational (fantasy, memory, internalized other)}
        manifestation: {description: The merging of selves in sexual union, the vulnerability of nakedness, the trust of intimacy}
        integration: {description: Sexual empathy — the capacity to feel the other's pleasure as one's own}

      L8_eros:
        interaction: {description: Mystical experience often uses erotic language — the soul's union with the divine as sexual metaphor}
        manifestation: {description: Tantra, ecstatic mysticism, the orgasmic dissolution of ego boundary}
        integration: {description: Eros as path to transcendence — not by escaping the body but through its fullest activation}

    #######################################
    # QUANTUM OVERLAY
    #######################################
    quantum_overlay:
      designation: Desire as Quantum Superposition of Union and Separation

      eros_quantum_concepts:
        - desire_as_superposition: {description: Sexual desire holds union and separation in superposition — wanting to merge AND wanting to remain distinct}
        - orgasm_as_decoherence: {description: The moment of sexual climax as collapse of the union/separation superposition into momentary definite state — followed by renewed superposition}
        - romantic_entanglement: {description: Two lovers in deep intimacy share emotional state that cannot be described independently — formal analogy to quantum entanglement}
        - complementarity_of_intimacy: {description: Autonomy and intimacy are complementary — full clarity of self prevents full merging; full merging blurs self-boundary}
        - uncertainty_principle_of_desire: {description: The more precisely we know what we want, the less we can know how it will feel; the more we feel desire, the less we can define its object}
        - quantum_tunneling_of_taboo: {description: Desire that tunnels through socially forbidden barriers — the affair, the kink, the transgressive fantasy that bypasses normal constraints}
        - observer_effect_in_intimacy: {description: The act of observing one's own sexual performance alters it — self-consciousness disrupts arousal}

    #######################################
    # REBEL OVERLAY
    #######################################
    rebel_overlay:
      designation: Eros as Liberation and Trap

      rebel_erotics:
        function: "The system controls through sexual shame and sells through sexual commodification. The rebel reclaims eros from both."

        practices:
          - shame_refusal: {description: Refusing to carry sexual shame implanted by culture, religion, or family}
          - pleasure_claiming: {description: Deliberately cultivating and expressing sexual pleasure as political act}
          - body_reclamation: {description: Reclaiming one's body from objectification, medicalization, and state control}
          - consent_culture_building: {description: Creating communities where explicit consent is norm — radical honesty about wanting and not-wanting}
          - queer_world_making: {description: Building relationships and communities that do not fit normative templates}
          - erotic_imagination_freedom: {description: Defending the right to fantasy, desire, and inner erotic life from surveillance and judgment}
          - sacred_sex_reclamation: {description: Treating sexuality as meaningful, spiritual, and transformative — not merely recreational or reproductive}

        tactics:
          - the_visible_body: {description: Refusing to hide the body that culture wants hidden — fat bodies, aging bodies, scarred bodies, queer bodies}
          - the_named_desire: {description: Speaking desire aloud — naming what you want breaks the silence that shame requires}
          - the_collective_orgasm: {description: Shared ecstatic experience as political bonding — dance, ritual, celebration}
          - the_refusal_of_commodification: {description: Rejecting the reduction of sex to transaction, performance, or content}

    #######################################
    # SHADOW OVERLAY
    #######################################
    shadow_overlay:
      designation: The Disowned Erotic Archive

      shadow_eros:
        description: "The shadow contains all sexual and relational material that the ego refuses — forbidden desires, traumatic memories, disowned pleasures, and the dark face of wanting."

        shadow_manifestations:
          - disowned_desire: {description: Wanting what culture forbids — same-sex attraction, kink, non-monogamy, power dynamics — appearing as compulsive fantasy or shame}
          - trauma_repetition: {description: Recreating abusive dynamics in adult relationships — the body seeking mastery through repetition}
          - pleasure_inhibition: {description: Inability to feel pleasure due to shame, guilt, or trauma — the body that cannot receive}
          - addictive_sexuality: {description: Compulsive sexual behavior that avoids genuine intimacy — quantity over quality, novelty over depth}
          - asexual_defense: {description: Complete sexual shutdown as protection against vulnerability — not genuine asexuality but defensive withdrawal}
          - perverse_fixation: {description: Sexual patterns that fixate on specific objects or scenarios — often trauma-derived, seeking symbolic resolution}
          - eroticized_aggression: {description: The fusion of sex and violence — rape fantasy, dominance/submission — requiring careful ethical and psychological analysis}

        shadow_integration:
          - fantasy_permission: {description: Allowing forbidden fantasies mental space without action or judgment — the imagination as safe container}
          - somatic_safety: {description: Creating bodily conditions where shadow material can emerge without overwhelm}
          - narrative_reconstruction: {description: Rewriting the story of one's sexuality to include shadow chapters with meaning}
          - relational_experimentation: {description: Safe, consensual exploration of shadow desires with trusted partners}
          - therapeutic_processing: {description: Working with trauma-derived sexual patterns to differentiate past from present}

    #######################################
    # PARAMETERS
    #######################################
    parameters:
      sexual_desire_intensity: {range: [0.0, 1.0], default: 0.5, description: Strength of sexual wanting}
