      depth_tolerance: {range: [0.0, 1.0], default: 0.4, description: Capacity to hold intense or disturbing qualia without dissociation}
      first_person_authority: {range: [0.0, 1.0], default: 0.7, description: Trust in one's own subjective report as valid data}
      intersubjective_qualia_resonance: {range: [0.0, 1.0], default: 0.4, description: Felt attunement to others' qualitative states}
      quantum_qualia_mode: {range: [0.0, 1.0], default: 0.3, description: Engagement with qualia as quantum-resonant phenomena}

    #######################################
    # FAILURE MODES
    #######################################
    failure_modes:
      qualia_solipsism: {description: Believing_only_one's_own_qualia_exist, symptom: dismissal_of_others_subjective_reports, prevention: intersubjective_verification_and_empathy}
      qualia_commodification: {description: Treating_qualia_as_products_to_be_consumed, symptom: experience_collecting_without_integration, prevention: depth_over_breadth}
      qualia_flattening: {description: Suppressing_qualia_range_for_comfort_or_compliance, symptom: chronic_anhedonia_or_emotional_numbing, prevention: rebel_qualia_practices}
