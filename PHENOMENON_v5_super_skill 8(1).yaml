      vestibular_stability: {range: [0.0, 1.0], default: 0.7, description: Sense of gravitational grounding and balance}
      motor_agency: {range: [0.0, 1.0], default: 0.6, description: Felt capacity to initiate and complete voluntary action}
      somatic_flexibility: {range: [0.0, 1.0], default: 0.5, description: Range of somatic states accessible without overwhelm}
      trauma_load: {range: [0.0, 1.0], default: 0.3, description: Amount of unprocessed somatic trauma stored in body}
      discharge_capacity: {range: [0.0, 1.0], default: 0.4, description: Ability to complete truncated defense responses safely}
