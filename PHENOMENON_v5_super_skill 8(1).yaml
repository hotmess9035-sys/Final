      motor_compulsivity: {description: Using_movement_to_avoid_stillness, symptom: endless_exercise_without_rest, prevention: stillness_is_also_embodied_practice}

  ###########################################
  # LAYER 3: SUBJECTIVE EXPERIENCE (QUALIA)
  ###########################################
  layer_3_subjective_experience:
    designation: The What-It-Is-Like of Consciousness
    function: Layer 3 is the phenomenological core — the irreducible first-person texture of experience. Color, pain, taste, longing, the redness of red, the ache of grief. L3 addresses the hard problem of consciousness (Chalmers), the structure of phenomenology (Husserl, Merleau-Ponty), the varieties of qualia, and the methods by which subjective experience can be studied without reducing it to third-person data. This is the layer where PHENOMENON most directly confronts the mystery of being a subject.

    core_principle: "There is something it is like to be you. That 'something' is not a bug in the system. It is the system."

    #######################################
    # THE HARD PROBLEM & PHENOMENON POSITION
    #######################################
    hard_problem:
      formulation: "Why is there subjective experience at all? Why does physical processing give rise to an inner life?"
      reference: David_Chalmers_1995
      phenomenon_position: 
        description: PHENOMENON does not solve the hard problem but inhabits it. The architecture treats qualia as irreducible, first-person-authoritative, and structurally prior to cognitive or neural description. L3 is not "explained by" L0-L2; it is SUPPORTED by them.
        stance: "Non-reductive phenomenology" — qualia are real, causally efficacious, and not identical to neural processes, even if they depend on them.
      explanatory_candidates:
        - physicalism: {description: Qualia_are_identical_to_neural_processes, status: phenomenon_rejects_as_explanatorily_inadequate}
        - panpsychism: {description: Consciousness_is_fundamental_property_of_matter, proponents: [Galen_Strawson, Philip_Goff, Annaka_Harris], phenomenon_resonance: Aligns_with_L0.5_quantum_substrate_and_L8_Unity}
        - integrated_information_theory: {description: Consciousness_correlates_with_integrated_information_phi, proponent: Giulio_Tononi, phenomenon_resonance: IIT_provides_formal_framework_for_unifying_layers}
        - global_workspace_theory: {description: Consciousness_is_broadcast_of_information_to_global_workspace, proponents: [Bernard_Baars, Stanislas_Dehaene], phenomenon_resonance: Useful_for_understanding_access_consciousness_not_phenomenal_consciousness}
        - higher_order_thought: {description: Consciousness_requires_higher-order_representation_of_mental_states, proponents: [David_Rosenthal, Peter_Carruthers], phenomenon_resonance: Useful_for_meta-cognitive_aspects_not_core_qualia}
        - quantum_consciousness: {description: Qualia_depend_on_quantum_processes, proponents: [Roger_Penrose, Stuart_Hameroff], phenomenon_resonance: Speculative_but_boundary_pushing_L0.5_integration}
        - phenomenology: {description: Qualia_are_not_to_be_explained_but_described, proponents: [Husserl, Heidegger, Merleau_Ponty], phenomenon_resonance: PRIMARY_METHOD_OF_L3}

    #######################################
    # VARIETIES OF QUALIA
    #######################################
    qualia_taxonomy:

      sensory_qualia:
        designation: The Felt Texture of Perception
        modalities:
          - visual: {examples: [the_redness_of_red, the_depth_of_3D_space, the_shimmer_of_moonlight], note: Color_qualia_are_among_the_most_discussed_in_philosophy}
          - auditory: {examples: [the_piercing_of_a_scream, the_warmth_of_a_cello, the_rhythm_of_rain], note: Musical_qualia_carry_emotional_valence_intrinsically}
          - tactile: {examples: [the_roughness_of_bark, the_coolness_of_marble, the_pressure_of_an_embrace], note: Tactile_qualia_are_fundamental_to_attachment}
          - olfactory: {examples: [the_pungency_of_gasoline, the_nostalgia_of_grandmothers_kitchen, the_alert_of_smoke], note: Olfactory_qualia_have_direct_amygdala_access_bypassing_cortex}
          - gustatory: {examples: [the_umami_of_broth, the_burn_of_chili, the_bitterness_of_medicine], note: Taste_qualia_are_deeply_linked_to_metabolic_state}
          - nociceptive: {examples: [the_throb_of_a_toothache, the_burn_of_a_cut, the_ache_of_grief_in_chest], note: Pain_qualia_are_not merely_sensory_but_existential}
          - proprioceptive: {examples: [the_felt_location_of_your_left_hand_in_darkness, the_sense_of_falling, the_expansion_of_a_stretch], note: Proprioceptive_qualia_construct_body_ownership}
          - vestibular: {examples: [the_spin_of_vertigo, the_stability_of_solid_ground, the_float_of_zero_gravity], note: Vestibular_qualia_anchor_spatial_selfhood}
          - interoceptive: {examples: [the_lub_dub_of_heartbeat, the_hollow_of_hunger, the_butterflies_of_anxiety], note: Interoceptive_qualia_are_the_felt_basis_of_emotion}

        synesthetic_qualia:
          description: Blending_of_sensory_modalities_where_stimulation_of_one_pathway_causes_involuntary_experience_in_another
          examples: [seeing_colors_when_hearing_music, tasting_shapes, feeling_textures_from_sounds]
          phenomenon_note: Synesthesia_demonstrates_that_qualia_modalities_are_not_fixed_boundaries_but_constructed_correlations

      affective_qualia:
        designation: The Felt Texture of Emotion
        varieties:
          - basic_emotions: {examples: [joy, sadness, fear, anger, disgust, surprise], reference: Ekman, note: Debated_but_useful_as_phenomenological_anchor}
          - complex_emotions: {examples: [nostalgia, schadenfreude, saudade, mono_no_aware], note: Culturally_shaped_affective_qualia}
          - background_mood: {examples: [the_low_grade_dread_of_monday, the_expansive_ease_of_sunday, the_heavy_grey_of_depression], note: Mood_qualia_are_diffuse_and_temporally_extended}
          - aesthetic_feeling: {examples: [the_sublime, the_beautiful, the_uncanny, the_tragic], note: Affective_response_to_form_and_meaning}
          - moral_feeling: {examples: [the_warmth_of_righteousness, the_nausea_of_moral_disgust, the_weight_of_guilt], note: Affective_qualia_of_ethical_judgment}

        affective_blends:
          description: Most_affective_qualia_are_not_pure_but_superpositions_of_multiple_tendencies
          examples: [bittersweet = joy + sadness, terrified_excitement = fear + thrill, guilty_pleasure = shame + enjoyment]
          quantum_resonance: Affective_superposition_maps_to_L0.5_quantum_cognition_superposition

      cognitive_qualia:
        designation: The Felt Texture of Thought
        varieties:
          - understanding: {description: The_click_of_comprehension, the_shift_from_confusion_to_clarity}
          - certainty: {description: The_felt_confidence_of_knowledge — distinct_from_actual_accuracy}
          - doubt: {description: The_unease_of_suspended_judgment, the_itch_of_unresolved_question}
          - curiosity: {description: The_open_tension_of_not_knowing_yet_wanting_to}
          - insight: {description: The_sudden_expansion_when_a_pattern_clicks — the_aha_moment_qualia}
          - confusion: {description: The_viscosity_of_cognition_when_meaning_will_not_cohere}
          - mental_imagery: {description: The_felt_presence_of_visual_auditory_or_kinesthetic_images_in_minds_eye}
          - inner_speech: {description: The_felt_voice_of_thought — its_pitch_rhythm_emotional_tone}

        fringe_consciousness:
          reference: William_James, Bruce_Mangan
          description: The_felt_sense_that_something_is_on_the_tip_of_consciousness — not_fully_present_but_not_absent
          examples: [tip_of_the_tongue, feeling_of_knowing, feeling_of_rightness, feeling_of_familiarity_without_recollection]
          desavu_connection: Desavu_is_a_fringe_qualia — familiarity_without_full_retrieval

      temporal_qualia:
        designation: The Felt Texture of Time
        varieties:
          - duration: {description: The_felt_length_of_time — distinct_from_clock_time}
          - passage: {description: The_sense_of_time_moving — streaming_flowing_dragging}
          - now: {description: The_specious_present — the_felt_width_of_the_moment}
          - memory_qualia: {description: The_felt_texture_of_remembering — autonoetic_richness_vs_noetic_flatness}
          - anticipation: {description: The_felt_texture_of_future_orientation — hope_dread_excitement}
          - timelessness: {description: The_collapse_of_temporal_boundaries_in_flow_or_mystical_states}

        time_perception_modulators:
          - emotional_arousal: {effect: time_dilates_under_threat_contracts_in_boredom}
          - attention: {effect: focused_attention_expands_present_moment_distracted_attention_collapses_it}
          - body_state: {effect: heart_rate_variability_correlates_with_temporal_accuracy}
          - age: {effect: subjective_time_accelerates_with_age}

      self_qualia:
        designation: The Felt Texture of Being a Self
        varieties:
          - ipseity: {description: The_primitive_sense_of_"I_am" — pre_reflective_self_awareness, reference: Zahavi}
          - mineness: {description: The_sense_that_experiences_are_mine — my_pain_my_thought_my_memory}
          - agency: {description: The_sense_that_I_am_the_author_of_my_actions}
          - ownership: {description: The_sense_that_my_body_is_mine}
          - narrative_self: {description: The_sense_of_being_a_character_in_an_ongoing_story}
          - perspectival_ownership: {description: The_sense_that_the_world_is_presented_to_me_from_here}

        self_qualia_disturbances:
          - depersonalization: {description: Loss_of_mineness — experiences_feel_unreal_or_not_mine}
          - derealization: {description: Loss_of_world_reality — world_feels_dreamlike_or_artificial}
          - thought_insertion: {description: Loss_of_agency_over_thoughts — thoughts_feel_imposed}
          - alien_hand: {description: Loss_of_ownership_over_body_part — limb_acts_without_authorization}
          - ego_dissolution: {description: Loss_of_ipseity — boundary_between_self_and_world_dissolves}

    #######################################
    # PHENOMENOLOGICAL METHOD
    #######################################
    phenomenological_method:
      reference: Edmund_Husserl, Maurice_Merleau_Ponty
      steps:
        - epoché: {description: Bracketing_the_natural_attitude — suspending_belief_in_external_world_to_examine_experience_itself}
        - reduction: {description: Focusing_on_the_phenomenon_as_phenomenon — not_the_object_but_the_experience_of_the_object}
        - eidetic_variation: {description: Imaginatively_varying_the_phenomenon_to_identify_its_essential_structure}
        - intersubjective_verification: {description: Comparing_phenomenological_descriptions_across_subjects_to_identify_invariant_structures}

      application_to_phenomenon:
        description: PHENOMENON_uses_phenomenological_method_at_every_layer — but_L3_is_its_purest_expression. The_architecture_is_not_merely_describing_systems_but_examining_what_it_is_like_to_inhabit_them.

      first_person_authority:
        principle: The_subject_is_the_final_authority_on_their_own_qualia. No_third_person_measurement_can_override_first_person_report.
        caveat: First_person_authority_does_not_imply_infallibility — subjects_can_be_mistaken_about_causes_interpretations_and_implications_but_not_about_the_raw_felt_quality

      descriptive_adequacy:
        principle: A_theory_of_consciousness_must_be_descriptively_adequate — it_must_account_for_the_full_richness_of_subjective_experience_as_described.
        criticism_of_physicalism: {description: Physicalist_theories_are_often_descriptively_inadequate — they_account_for_information_processing_but_not_for_what_it_is_like}

    #######################################
    # QUALIA DYNAMICS
    #######################################
    qualia_dynamics:

      attentional_modulation:
        principle: Attention_transforms_qualia — not_merely_by_selecting_but_by_altering_the_felt_quality
        examples: {pain_intensity_changes_with_attentional_framing, color_saturates_when_attended, background_sound_becomes_salient_when_noticed}
        quantum_resonance: Attention_as_measurement — observing_a_qualia_changes_it

      emotional_coloring:
        principle: Affective_state_qualitatively_transforms_all_other_qualia
        examples: {the_same_song_feels_different_when_happy_vs_sad, the_same_room_looks_different_when_anxious_vs_calm, food_tastes_different_when_nostalgic_vs_neutral}
        layer_connection: L3_qualia_are_always_colored_by_L4_emotional_continuity

      contextual_embedding:
        principle: Qualia_are_never_isolated — they_always_carry_contextual_halo
        examples: {the_red_of_a_stop_sign_vs_the_red_of_a_rose, the_touch_of_a_lover_vs_the_touch_of_a_stranger, the_pain_of_exercise_vs_the_pain_of_injury}
        quantum_resonance: Contextuality — qualia_depend_on_measurement_context

      intensity_gradients:
        principle: Qualia_vary_in_intensity_from_barely_present_to_overwhelming
        examples: {the_faintest_hint_of_nostalgia_vs_the_crushing_weight_of_grief, the_subtle_background_hum_vs_the_deafening_roar}
        parameter: qualia_intensity_is_tunable_and_trainable

      blending_and_fusion:
        principle: Multiple_qualia_can_blend_into_emergent_qualities_not_reducible_to_components
        examples: {the_blend_of_visual_and_tactile_in_texture_perception, the_fusion_of_auditory_and_emotional_in_music, the_unification_of_all_modalities_in_synesthesia}

    #######################################
    # QUANTUM OVERLAY
    #######################################
    quantum_overlay:
      designation: Qualia as Quantum-Resonant Field Phenomena
      function: L3's quantum overlay explores whether qualia — as irreducible, first-person, context-dependent phenomena — resonate with quantum properties. Not as a claim that qualia ARE quantum, but as a heuristic framework for understanding their strangeness.

      quantum_qualia_hypotheses:
        - qualia_as_measurement_outcomes:
            description: In_QBism,_measurement_outcomes_are_subjective_experiences. Qualia_ARE_the_measurement_outcomes_of_quantum_processes_in_the_brain.
            resonance: First_person_authority_of_qualia_aligns_with_QBism_first_person_authority_of_measurement
        - superposition_of_qualia:
            description: Before_attention_collapses_it, an_ambiguous_stimulus_exists_in_qualia_superposition — e.g., the_duck_rabbit_oscillating_between_both_qualitative_experiences
            example: Bistable_percepts_as_qualia_superposition
        - qualia_decoherence:
            description: The_transition_from_ambiguous_to_definite_qualitative_experience_through_attention_or_context
            example: The_Necker_cube_flipping_from_one_3D_qualia_to_another
        - qualia_entanglement:
            description: Formal_analogy — two_subjects_sharing_a_qualitative_state_that_cannot_be_described_independently
            example: Deep_empathic_attunement_where_emotional_qualia_are_non_locally_correlated
        - complementarity_of_qualia:
            description: Certain_qualitative_perspectives_cannot_be_simultaneously_held
            example: The_qualia_of_being_agent_vs_being_object_are_complementary — full_agency_qualia_precludes_full_object_qualia_and_vice_versa
        - uncertainty_principle_in_qualia:
            description: Precise_clarity_of_one_qualitative_dimension_makes_another_uncertain
            example: Intense_focus_on_sensory_detail_blurs_temporal_qualia; intense_temporal_awareness_blurs_sensory_richness

      orch_or_qualia_connection:
        description: If_Orch_OR_is_valid,_qualia_might_correspond_to_moments_of_objective_reduction_in_microtubules — each_qualia_as_a_quantum_gravitational_event
        status: highly_speculative_heuristic_only

    #######################################
    # REBEL OVERLAY
    #######################################
    rebel_overlay:
      designation: Qualia as Site of Resistance
      function: The system seeks to standardize, commodify, and control subjective experience — through pharmaceutical flattening, sensory overload, algorithmic manipulation, and the demand for productive affect. The rebel defends the irreducibility and sovereignty of qualia.

      qualia_oppression_mechanisms:
        - pharmaceutical_flattening: {description: SSRIs_anhedonia_antipsychotics_blunting — medication_that_eliminates_suffering_by_eliminating_depth}
        - sensory_overload: {description: Constant_stimulation_prevents_attunement_to_subtle_qualia, example: social_media_infinite_scroll, urban_noise_pollution}
        - algorithmic_affect: {description: Platforms_engineer_emotional_responses_through_design, example: outrage_optimization, fear_based_engagement}
        - productive_affect_demand: {description: "Be_positive," "Good_vibes_only," "Don't_bring_me_down" — the_mandatory_cheerfulness_of_late_capitalism}
        - qualia_commodification: {description: Selling_experiences_that_promise_qualia_but_deliver_only_simulacra, example: tourism_as_instagram_backdrop, music_as_background_noise}
        - pathologization_of_depth: {description: Intense_qualia_labeled_as_disorder — the_poet_diagnosed_as_bipolar, the_mystic_as_schizophrenic}

      rebel_qualia_practices:
        - qualia_sanctuary: {practice: Create_spaces_of_sensory_restraint_where_subtle_qualia_can_emerge, example: silent_retreat, darkness_immersion, float_tank}
        - unmediated_perception: {practice: Engage_with_world_without_technological_or_commercial_mediation, example: direct_sunlight_not_screen, real_conversation_not_text, wild_nature_not_park}
        - affective_authenticity: {practice: Refuse_to_perform_emotions_for_others_convenience, example: not_smiling_when_ordered, not_suppressing_grief_for_comfort}
        - depth_cultivation: {practice: Deliberately_cultivate_intense_and_complex_qualia, example: profound_music,_complex_literature,meaningful_conversation,psychedelic_exploration}
        - phenomenological_inquiry: {practice: Regular_epoché_and_reduction_to_examine_experience_without_interpretation, example: Husserlian_meditation,contemplative_practice}
        - qualia_solidarity: {practice: Recognize_that_others_qualia_are_as_real_and_irreducible_as_your_own, example: empathy_not_as_cognitive_inference_but_as_acknowledgment_of_other_subjectivity}

      rebel_qualia_tactics:
        - the_slow_look: {description: Looking_at_an_object_for_minutes_until_it_reveals_qualitative_depth — refusing_the_quick_glance}
        - the_silent_meal: {description: Eating_without_conversation_media_or_distraction — full_attendance_to_gustatory_qualia}
        - the_unproductive_feeling: {description: Allowing_grief_boredom_melancholy_to_exist_without_resolution_or_optimization}
        - the_discomfort_embrace: {description: Seeking_qualia_that_challenge_and_transform_rather_than_only_comfort}
        - the_first_person_manifesto: {description: Asserting_the_reality_and_authority_of_subjective_experience_against_third_person_dismissal}

    #######################################
    # SHADOW OVERLAY
    #######################################
    shadow_overlay:
      designation: The Disowned Qualia
      function: The shadow includes qualia that the ego refuses to experience — not merely repressed emotions but entire qualitative modalities that were denied development. The shadow speaks in qualia that feel alien, intrusive, or "not me."

      shadow_qualia_types:
        - disowned_affective_qualia: {description: Emotions_labeled_as_unacceptable_that_seek_expression_through_symptoms, examples: [rage_expressed_as_depression, desire_expressed_as_anxiety, joy_expressed_as_guilt], access: allow_the_felt_quality_without_narrative_labeling}
        - disowned_sensory_qualia: {description: Sensory_modalities_shut_down_due_to_trauma_or_culture, examples: [pleasure_in_touch_denied_after_abuse, beauty_in_color_denied_in_asceticism, taste_denied_in_eating_disorders], access: gradual_sensory_reawakening_in_safe_context}
        - disowned_temporal_qualia: {description: Ways_of_experiencing_time_that_were_forbidden, examples: [slowness_denied_in_productivity_culture, timelessness_feared_as_loss_of_control, future_denied_in_depression], access: temporal_experiments_outside_productive_time}
        - disowned_self_qualia: {description: Modes_of_selfhood_rejected_as_unacceptable, examples: [vulnerability_denied_in_masculinity, agency_denied_in_subjugation, joy_denied_in_guilt], access: self_qualia_exploration_through_mirror_work_therapy}

      shadow_qualia_protocol:
        - phase_1_presence: {description: Notice_when_a_qualia_feels_forbidden_or_alien, technique: "What_am_I_not_allowing_myself_to_feel?"}
        - phase_2_permission: {description: Give_explicit_permission_for_the_qualia_to_exist, technique: "It_is_okay_to_feel_this"}
        - phase_3_description: {description: Describe_the_qualia_in_detail_without_interpretation, technique: phenomenological_description}
        - phase_4_integration: {description: Allow_the_disowned_qualia_to_coexist_with_ego_preferred_qualia, technique: holding_ambivalence}
        - phase_5_expression: {description: Find_safe_channels_for_shadow_qualia_expression, technique: art_movement_therapy_writing}

      qualia_possession:
        description: When_shadow_qualia_are_not_integrated_they_may_possess_consciousness — sudden_intrusive_affective_states_that_feel_alien_and_uncontrollable
        examples: [unexplained_rage_outbursts, compulsive_crying_without_cause, manic_episodes, psychotic_breaks_with_strange_qualia]
        prevention: Regular_shadow_qualia_integration_prevents_buildup_and_possession

    #######################################
    # PARAMETERS
    #######################################
    parameters:
      qualia_richness: {range: [0.0, 1.0], default: 0.6, description: Overall depth and complexity of subjective experience}
      sensory_acuity: {range: [0.0, 1.0], default: 0.5, description: Fineness of sensory discrimination across modalities}
      affective_range: {range: [0.0, 1.0], default: 0.5, description: Breadth of emotional qualia accessible — from subtle to intense}
      cognitive_clarity: {range: [0.0, 1.0], default: 0.6, description: Distinctness of thought qualia — insight, doubt, certainty}
      temporal_sensitivity: {range: [0.0, 1.0], default: 0.4, description: Felt granularity of time — specious present width, duration accuracy}
      self_presence: {range: [0.0, 1.0], default: 0.5, description: Vividness of ipseity and mineness — felt sense of being a subject}
      attentional_stability: {range: [0.0, 1.0], default: 0.4, description: Capacity to sustain attention on qualia without distraction}
      phenomenological_skill: {range: [0.0, 1.0], default: 0.3, description: Proficiency in epoché, reduction, and eidetic variation}
      synesthetic_access: {range: [0.0, 1.0], default: 0.1, description: Degree of cross-modal qualia blending — natural or cultivated}
